    само на регионално ниво ако сакаме карти на ниво на област?
  malais: Membenarkan pilihan untuk menerbitkan semua peta atau hanya yang mempunyai
    butiran yang diingini. Contohnya, adakah kita mahu menerbitkan peta yang hanya
    wujud di peringkat wilayah jika kita mahu peta di peringkat daerah?
  malgache: Mamela hisafidy raha tiana ny hamoaka ny sarintany rehetra na ireo izay
    manana ny halehibeazana irina ihany. Ohatra, azo ve ny hamoaka sarintany izay
