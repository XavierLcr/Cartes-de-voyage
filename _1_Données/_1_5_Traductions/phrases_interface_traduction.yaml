  kirghize: Интерфейсти жана зыярат кылынган өлкөлөрдүн тизмесин баштапкы абалга келтирүү.
    Ушул баскычты басуудан мурун учурдагы жөндөөлөрдү сактап калганыңызды текшериңиз
  kurde: Navbeynûbera û lîsteya welatên serdan kirî ji nû ve saz bike. Ji kerema xwe
