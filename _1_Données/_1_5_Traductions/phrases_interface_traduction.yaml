    νομού;
  grec ancien: Ἐάτω αἱρεῖσθαι εἰ βούλεταί τις τὰς ἁπάσας χάρτας ἐκδιδόναι ἢ μόνον
    τὰς τὴν ἐπιθυμητὴν λεπτότητα ἐχούσας. Πότερον βουλόμεθα παραδιδόναι, οἷον, χάρτην
    ἥτις οὐκ ἔστιν εἰ μὴ κατὰ τὴν περιφέρειαν ἐὰν χάρτας κατὰ τὸν νομόν βουλώμεθα;
  géorgien: შეიძლება არჩევანის გაკეთება, გამოქვეყნდეს თუ არა რუკების მთელი ნაკრები,
    თუ მხოლოდ ის რუკები, რომლებსაც სურთ გრანულარობა. მაგალითად, გვინდა თუ არა რეგიონულ
    დონეზე არსებული რუკის გამოქვეყნება, თუ დეპარტამენტის დონის რუკები გვსურს?
  hindi: यह चुनने की अनुमति देता है कि क्या संपूर्ण मानचित्र प्रकाशित करना है या केवल
    वे जिनमें वांछित दानेदारी है। उदाहरण के लिए, क्या कोई ऐसा मानचित्र प्रकाशित करना
    चाहता है जो केवल क्षेत्रीय स्तर पर मौजूद है यदि कोई जिला स्तर के मानचित्र चाहता
    है?
  hongrois: Lehetőséget ad arra, hogy kiválasszuk, a térképek egészét vagy csak a
