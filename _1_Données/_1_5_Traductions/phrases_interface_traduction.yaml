    در سطح منطقه‌ای وجود دارد منتشر کنیم، در صورتی که نقشه‌هایی در سطح شهرستان مورد
    نظر باشد؟
  polonais: Pozwala wybrać, czy publikować wszystkie mapy, czy tylko te o wymaganej
