    départemental ?
  gallois: Canysgu'n ddewis a gyhoeddir yr holl fapiau neu'r rheini'n unig sydd â'r
    graddfa fân a ddymunir. A ydym, er enghraifft, eisiau cyhoeddi map sy'n bodoli
    ar lefel ranbarthol yn unig os ydym yn dymuno mapiau ar lefel sirol?
  grec: Επιτρέπει την επιλογή αν θέλουμε να δημοσιεύσουμε το σύνολο των χαρτών ή μόνο
