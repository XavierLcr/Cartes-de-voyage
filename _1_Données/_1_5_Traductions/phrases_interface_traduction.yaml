Si cochée, les recommandations sont groupées par pays. Sinon, elles sont triées par pertinence:
  afrikaans: Indien gemerk, word aanbevelings per land gegroepeer. Anders word hulle
    volgens relevansie gesorteer
  albanais: Nëse shënohet, rekomandimet grupohen sipas vendit. Përndryshe, ato renditen
    sipas rëndësisë
  allemand: Wenn angekreuzt, werden die Empfehlungen nach Ländern gruppiert. Andernfalls
    werden sie nach Relevanz sortiert
  anglais: If checked, recommendations are grouped by country. Otherwise, they are
    sorted by relevance
  arabe: إذا تم تحديد هذا الخيار، فسيتم تجميع التوصيات حسب البلد. وإلا، فسيتم ترتيبها
    حسب الصلة
  arménien: Եթե նշված է, առաջարկները խմբավորված են երկրների հիման վրա։ Հակառակ դեպքում,
    դրանք կարգավորված են համապատասխանության աստիճանով։
  basque: Egiaztatzen bada, gomendioak herrialdearen arabera taldekatuko dira. Bestela,
    garrantziaren arabera ordenatuko dira
  bengali: যদি টিক করা হয়, তাহলে সুপারিশগুলি দেশ অনুযায়ী গ্রুপিং করা হবে। অন্যথায়,
    সেগুলি প্রাসঙ্গিকতা অনুসারে সাজানো হবে।
  birman: အမှန်ခြစ်ကိစ္စပါက၊ အကြံပြုချက်များကို နိုင်ငံအလိုက်စုစည်းထားသည်။ မဟုတ်ပါက၊
