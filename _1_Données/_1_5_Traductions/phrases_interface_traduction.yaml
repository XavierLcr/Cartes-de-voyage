    szintű térképeket szeretnénk?
  indonésien: Memungkinkan untuk memilih apakah akan mempublikasikan semua peta atau
    hanya yang memiliki granularitas yang diinginkan. Misalnya, apakah kita ingin
    mempublikasikan peta yang hanya ada di tingkat regional jika kita menginginkan
    peta di tingkat kabupaten/kota?
  irlandais: Ligeann sé duit a roghnú an bhfuil tú ag iarraidh na léarscáileanna go
    léir a fhoilsiú nó gan ach iad siúd a bhfuil an gráinneacht atá uait acu. Mar
