  lituanien: Leidžia pasirinkti, ar norima publikuoti visus žemėlapius, ar tik tuos,
    kurie turi pageidaujamą detalumą. Ar norime, pavyzdžiui, publikuoti žemėlapį,
    kuris egzistuoja tik regioniniu lygiu, jei norime žemėlapių departamento lygiu?
  luxembourgeois: Erlaabt ze wielen, ob een all d'Kaarten wëll publizéieren oder nëmmen
    déi mat der gewënschter Granularitéit. Wëll een zum Beispill eng Kaart publizéieren,
