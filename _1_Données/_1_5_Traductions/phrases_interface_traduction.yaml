  esperanto: Restarigu la interfacon kaj ankaŭ la liston de vizititaj landoj. Bonvolu
    kontroli, ke vi konservis la nunajn agordojn antaŭ klaki tiun butonon
  estonien: Lähtesta kasutajaliides ja külastatud riikide loend. Palun veenduge, et
