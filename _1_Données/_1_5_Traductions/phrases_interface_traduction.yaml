  géorgien: შესაძლებლობას იძლევა დაამატოთ ტერიტორიების სახელები რუკაზე
  hindi: मानचित्र पर क्षेत्रों के नाम जोड़ने की अनुमति देता है।
  hongrois: Lehetővé teszi a területek neveinek hozzáadását a térképre
  indonésien: Memungkinkan untuk menambahkan nama wilayah pada peta
  irlandais: Ceadaíonn sé ainmneacha na teritóireachtaí a chur ar an mapáil
  islandais: Leyfir að bæta við nöfnum landsvæðanna á kortið
  italien: Permette di aggiungere i nomi dei territori sulla mappa
  japonais: 地図に地域名を追加できます。
  kazakh: Картаға аумақтардың атауларын қосуға мүмкіндік береді
  kirghize: Картага аймактардын аттарын кошууга мүмкүндүк берет
  kurde: Îmkana zêdekirina navên herêman li ser nexşeyê dide
  latin: Sinit nomina territoriorum in mappam addere
  letton: Ļauj pievienot teritoriju nosērumus kartē
  lituanien: Leidžia pridėti teritorijų pavadinimus į žemėlapį
  luxembourgeois: Erlaabt et, den Numm vun de Territorie op der Kaart hinzefuegen
  macédonien: Овозможува додавање на имињата на териториите на мапата
  malais: Membolehkan penambahan nama wilayah pada peta
  malgache: Mamela hanampy ny anaran'ny faritra eo amin'ny sarintany
  maltais: Jippermetti li żżid l-ismijiet it-territorji fuq il-mappa
  mandarin standard: 允许在地图上添加区域名称。
  mongol: Газрын зураг дээр нутаг дэвсгэрүүдийн нэрийг нэмэх боломжийг олгоно
  norvégien: Lar deg legge til navnene på territoriene på kartet
  néerlandais: Maakt het mogelijk om de namen van de territoria op de kaart toe te
    voegen
  népalais: नक्सामा क्षेत्रहरूको नाम थप्न अनुमति दिन्छ।
  ourdou: نقشے پر علاقوں کے نام شامل کرنے کی اجازت دیتا ہے۔
  ouzbek: Xaritaga hududlar nomini qo'shish imkonini beradi
  pachto: په نقشه باندې د سیمو نومونه اضافه کولو اجازه ورکوي
  persan: امکان افزودن نام قلمروها به نقشه را فراهم می‌کند
  polonais: Pozwala na dodanie nazw terytoriów na mapie
  portugais: Permite adicionar o nome dos territórios no mapa
  roumain: Permite adăugarea numelor teritoriilor pe hartă
  russe: Позволяет добавить названия территорий на карту
  serbo-croate: Omogućava dodavanje naziva teritorija na kartu
  slovaque: Umožňuje pridať názvy území na mapu
  slovène: Omogoča dodajanje imen teritorijev na zemljevid
  suédois: Gör det möjligt att lägga till namnen på territorierna på kartan
  swahili: Inaruhusu kuongeza majina ya maeneo kwenye ramani
  tadjik: Имкон медиҳад, ки номи ҳудудҳо ба харита илова шаванд
  tamoul: வரைபடத்தில் பிராந்தியங்களின் பெயர்களைச் சேர்க்க அனுமதிக்கிறது
  tchèque: Umožňuje přidat názvy území na mapu
  thaï: ช่วยให้สามารถเพิ่มชื่อดินแดนลงบนแผนที่ได้
  tibétain: ས་ཁྲའི་སྟེང་ལ་ས་ཁོར་གྱི་མིང་སྣོན་ཆོག
  turc: Haritaya bölge isimleri eklemeyi sağlar
  turkmène: Kartada çäkleriň atlaryny goşmaga mümkinçilik berýär
  ukrainien: Дозволяє додати назви територій на мапі
  vietnamien: Cho phép thêm tên các vùng lãnh thổ lên bản đồ
  zoulou: Kuvumela ukwengeza amagama ezindawo emmephu
? Permet de choisir la couleur d'arrière plan. Sont disponibles comme couleurs le
  blanc, divers bleus plus ou moins proche de la couleur de la mer, ainsi que transparent.
  Le bleu le plus clair disponible est celui utilisé pour représenter les lacs sur
  les cartes.
: afrikaans: Laat toe om die agtergrondkleur te kies. Beskikbaar as kleure is wit,
    verskeie blou kleure meer of minder soortgelyk aan die kleur van die see, asook
    deursigtig. Die ligste blou wat beskikbaar is, is die een wat gebruik word om
    mere op kaarte voor te stel
  albanais: Lejo të zgjedhësh ngjyrën e sfondit. Janë të disponueshme si ngjyra e
    bardhë, blu të ndryshme më shumë ose më pak afër ngjyrës së detit, si dhe transparent.
    Bluja më e lehtë në dispozicion është ajo që përdoret për të përfaqësuar liqenet
    në harta
  allemand: Ermöglicht die Auswahl der Hintergrundfarbe. Als Farben stehen Weiß, verschiedene
    Blautöne, die mehr oder weniger der Farbe des Meeres ähneln, sowie Transparent
    zur Verfügung. Das hellste verfügbare Blau ist dasjenige, das zur Darstellung
    von Seen auf Karten verwendet wird
  anglais: Allows you to choose the background color. Available colors are white,
    various blues more or less close to the sea color, as well as transparent. The
    lightest blue available is the one used to represent lakes on maps
  arabe: يسمح لك باختيار لون الخلفية. الألوان المتاحة هي الأبيض، درجات مختلفة من اللون
    الأزرق القريبة من لون البحر، بالإضافة إلى الشفاف. أفتح لون أزرق متاح هو المستخدم
    لتمثيل البحيرات على الخرائط
  arménien: Ներկայացնում է ֆոնի գույնի ընտրությունը։ Հասանելի գույներն են սպիտակը,
    տարբեր կապույտներ՝ ավելի կամ պակաս մոտ ծովի գույնին, ինչպես նաև թափանցիկը։ Առկա
    ամենաթեթև կապույտը օգտագործվում է քարտեզների վրա լճերը ներկայացնելու համար։
  basque: Atzeko planoko kolorea aukeratzeko aukera ematen du. Koloreen artean zuria,
    itsasoaren kolorearen antzeko hainbat urdin, eta gardena daude. Eskuragarri dagoen
    urdin argienak mapetan lakuak irudikatzeko erabiltzen dena da
  bengali: পটভূমির রঙ নির্বাচন করার অনুমতি দিন। সাদা, বিভিন্ন নীল যা সমুদ্রের রঙের
    কাছাকাছি, সেইসাথে স্বচ্ছ রঙ হিসাবে উপলব্ধ। সবচেয়ে হালকা নীল যা উপলব্ধ তা মানচিত্রে
    হ্রদগুলি চিত্রিত করতে ব্যবহৃত হয়।
  birman: နောက်ခံအရောင်ကို ရွေးချယ်နိုင်ပါတယ်။ အဖြူရောင်၊ ပင်လယ်အရောင်နှင့်နီးစပ်သော
    အပြာရောင်အမျိုးမျိုး၊ နှင့် ပွင့်လင်းမြင်သာမှုတို့ ရရှိနိုင်ပါတယ်။ ရရှိနိုင်သော
    အဖျော့ဆုံးအပြာရောင်မှာ မြေပုံများပေါ်ရှိ ရေကန်များကို ကိုယ်စားပြုရန် အသုံးပြုသော
    အရောင်ဖြစ်သည်။
  breton: Aesañ a ra da zibab liv an a-dreñv. Er c'herz eo ar gwenn, meur a glas tost
    pe dost da liv ar mor, hag ivez treuzwelus. Ar glas sklaerañ zo da gaout eo hini
    implijet evit diskouez al lennoù war ar c'hartennoù
  bulgare: Позволява избор на цвят на фона. Налични като цветове са бяло, различни
    сини, повече или по-малко близки до цвета на морето, както и прозрачно. Най-светлото
    налично синьо е това, използвано за представяне на езерата на картите
  catalan: Permet triar el color de fons. Són disponibles com a colors el blanc, diversos
    blaus més o menys propers al color del mar, així com transparent. El blau més
    clar disponible és el que s'utilitza per representar els llacs als mapes
  corse: Permette di sceglie u culore di fondu. Sò dispunibili cum'è culori u biancu,
    diversi blu più o menu vicini à u culore di u mare, è ancu trasparente. U blu
    u più chjaru dispunibile hè quellu utilizatu per riprisintà i laghi nantu à e
    carte
  coréen: 배경 색상을 선택할 수 있습니다. 흰색, 바다색과 비슷한 다양한 파란색, 투명색을 사용할 수 있습니다. 사용 가능한 가장 밝은 파란색은
    지도에서 호수를 나타내는 데 사용됩니다
  danois: Giver mulighed for at vælge baggrundsfarve. Hvid, forskellige blå farver
    mere eller mindre tæt på havets farve samt transparent er tilgængelige som farver.
    Den lyseste blå, der er tilgængelig, er den, der bruges til at repræsentere søer
    på kort
  espagnol: Permite elegir el color de fondo. Están disponibles como colores el blanco,
    varios azules más o menos cercanos al color del mar, así como transparente. El
    azul más claro disponible es el que se utiliza para representar los lagos en los
    mapas
  esperanto: Eblas elekti la fonan koloron. Kiel koloroj disponeblas blanka, diversaj
    bluoj pli-malpli proksimaj al la koloro de la maro, kaj travidebla. La plej hela
    bluo disponebla estas tiu uzata por reprezenti lagojn sur la mapoj
  estonien: Võimaldab valida taustavärvi. Saadaval on valge, mitmesugused sinised,
    mis on rohkem või vähem merevärvi lähedased, samuti läbipaistev. Heledaim sinine,
    mis on saadaval, on see, mida kasutatakse järvede esitamiseks kaartidel
  finnois: Mahdollistaa taustavärin valinnan. Värivaihtoehtoina ovat valkoinen, erilaiset
    meren värille läheiset siniset sekä läpinäkyvä. Vaalein saatavilla oleva sininen
    on sama, jota käytetään kartoilla järvien esittämiseen
  français: Permet de choisir la couleur d'arrière plan. Sont disponibles comme couleurs
    le blanc, divers bleus plus ou moins proche de la couleur de la mer, ainsi que
    transparent. Le bleu le plus clair disponible est celui utilisé pour représenter
    les lacs sur les cartes
  gallois: Yn caniatáu dewis lliw cefndir. Mae gwyn, amrywiol las yn fwy neu lai yn
    agos i liw'r môr, yn ogystal â thryloyw, ar gael fel lliwiau. Y glas ysgafnaf
    sydd ar gael yw'r un a ddefnyddir i gynrychioli llynnoedd ar fapiau
  grec: Επιτρέπει την επιλογή του χρώματος φόντου. Είναι διαθέσιμα ως χρώματα το λευκό,
    διάφορα μπλε που μοιάζουν λίγο-πολύ με το χρώμα της θάλασσας, καθώς και διαφανές.
    Το πιο ανοιχτό γαλάζιο που είναι διαθέσιμο είναι αυτό που χρησιμοποιείται για
    την αναπαράσταση των λιμνών στους χάρτες
  grec ancien: Ἐπιλέγεσθαι χρῶμα ὑποθέσεως. Ἔστι δὲ διαθέσιμα λευκόν, ποικίλα κυανοῦ
    χρώματος μᾶλλον ἢ ἧσσον ἐγγὺς θαλάττης, καὶ διαφανές. Ὁ δὲ ἐλαφρότατος κυανοῦ
    χρώματος διαθέσιμος ἐστὶν ὁ χρώμενος εἰς τὴν παράστασιν λιμνῶν ἐν ταῖς χάρταις
  géorgien: ფონის ფერის არჩევის შესაძლებლობა. ხელმისაწვდომია თეთრი ფერი, სხვადასხვა
    ლურჯი, ზღვის ფერის მსგავსი და გამჭვირვალე. ყველაზე ღია ლურჯი ფერი გამოიყენება
    რუკებზე ტბების წარმოსაჩენად
  hindi: पृष्ठभूमि रंग चुनने की अनुमति है। सफेद, समुद्र के रंग के समान विभिन्न नीले
    रंग, और पारदर्शी रंग उपलब्ध हैं। सबसे हल्का नीला रंग मानचित्रों पर झीलों को दर्शाने
    के लिए उपयोग किया जाता है।
  hongrois: Lehetővé teszi a háttérszín kiválasztását. A fehér, a tenger színéhez
    többé-kevésbé közelítő különböző kékek, valamint az átlátszó színek érhetők el.
    A legvilágosabb kék, ami elérhető, a tavakat ábrázolja a térképeken
  indonésien: Memungkinkan untuk memilih warna latar belakang. Warna yang tersedia
    adalah putih, berbagai warna biru yang kurang lebih mirip dengan warna laut, serta
    transparan. Biru paling terang yang tersedia adalah yang digunakan untuk mewakili
    danau pada peta
  irlandais: Ligeann sé duit dath cúlra a roghnú. Tá bán, gormacha éagsúla níos gaire
    nó níos faide i gcéin do dhath na farraige, agus trédhearcach ar fáil mar dhathanna.
    Is é an gorm is éadroime atá ar fáil an ceann a úsáidtear chun lochanna a léiriú
    ar léarscáileanna
  islandais: Gerir þér kleift að velja bakgrunnslit. Hvítt, ýmsir bláir litir sem
    líkjast sjó og gagnsætt eru í boði. Ljósblái liturinn sem er í boði er notaður
    til að tákna vötn á kortum
  italien: Permette di scegliere il colore di sfondo. Sono disponibili come colori
    il bianco, diversi blu più o meno simili al colore del mare, e il trasparente.
    Il blu più chiaro disponibile è quello utilizzato per rappresentare i laghi sulle
    mappe
  japonais: 背景色を選択できます。白、海の色の濃淡に近い様々な青色、そして透明色が利用可能です。最も明るい青色は、地図上で湖を表すために使用されるものです。
  kazakh: Артқы фон түсін таңдауға мүмкіндік береді. Ақ, теңіз түсіне жақын әртүрлі
    көк, сондай-ақ мөлдір түстер қолжетімді. Ең ашық көк түс карталардағы көлдерді
    көрсету үшін қолданылады
  kirghize: Фондун түсүн тандоого мүмкүнчүлүк берет. Ак, деңиздин түсүнө жакын ар
    кандай көк түстөр, ошондой эле тунук түстөр бар. Эң ачык көк түс карталарда көлдөрдү
    көрсөтүү үчүн колдонулат
  kurde: ڕێگە دەدات ڕەنگی پاشخان هەڵبژێریت. وەک ڕەنگ سپی، چەندین شین کە نزیکن لە ڕەنگی
    دەریا، هەروەها ڕوون. شینی ڕووناکتر کە بەردەستە ئەوەیە کە بۆ نیشاندانی دەریاچەکان
    لەسەر نەخشەکان بەکاردێت
  latin: Permittit colorem tergiversationis eligere. Colores praesto sunt albus, diversi
    caerulei mari proximi, et etiam transparens. Caeruleus levissimus praesto est
    ille qui lacūs in mappis depingit
  letton: Ļauj izvēlēties fona krāsu. Ir pieejami kā krāsas balta, dažādi zili, vairāk
    vai mazāk tuvu jūras krāsai, kā arī caurspīdīga. Gaišākais zilais, kas pieejams,
    ir tas, ko izmanto, lai attēlotu ezerus kartēs
  lituanien: Leidžia pasirinkti fono spalvą. Kaip spalvos prieinami balti, įvairūs
    mėlyni atspalviai, daugiau ar mažiau artimi jūros spalvai, taip pat permatomi.
    Šviesiausia mėlyna spalva, kurią galima pasirinkti, yra ta, kuri naudojama ežerams
    žemėlapiuose žymėti
  luxembourgeois: Erlaabt d'Hannergrondfaarf ze wielen. Als Faarwe sinn wäiss, verschidde
    blo Téin méi oder manner no bei der Faarf vum Mier, souwéi transparent verfügbar.
    De hellste bloe Ton deen verfügbar ass, gëtt benotzt fir d'Séien op de Kaarten
    duerzestellen
  macédonien: Овозможува избор на боја на позадината. Достапни се бела, разни сини
    блиски до бојата на морето, како и проѕирна. Најсветлата сина боја достапна е
    онаа што се користи за претставување на езерата на картите
  malais: Membolehkan pemilihan warna latar belakang. Warna yang tersedia adalah putih,
    pelbagai warna biru yang lebih kurang serupa dengan warna laut, serta lutsinar.
    Warna biru paling cerah yang tersedia adalah warna yang digunakan untuk mewakili
    tasik pada peta
  malgache: Mamela hisafidy ny lokon'ny ambadika. Misy loko fotsy, manga maromaro
    izay saika mitovy amin'ny lokon'ny ranomasina, ary mangarahara. Ny manga mazava
    indrindra dia ilay ampiasaina hanehoana ny farihy amin'ny sarintany
  maltais: Jippermetti li tagħżel il-kulur tal-isfond. Il-kuluri disponibbli huma
    l-abjad, diversi blu aktar jew inqas qrib il-kulur tal-baħar, kif ukoll trasparenti.
    L-aktar blu ċar disponibbli huwa dak użat biex jirrappreżenta l-lagi fuq il-mapep
  mandarin standard: 允许选择背景颜色。 可用的颜色有白色，各种接近海的蓝色，以及透明。 可用的最浅的蓝色是用于在地图上表示湖泊的颜色。
  mongol: Арын өнгө сонгох боломжтой. Цагаан, далайн өнгөтэй ойролцоо янз бүрийн цэнхэр,
    мөн тунгалаг өнгөнүүд ашиглах боломжтой. Хамгийн цайвар цэнхэр өнгө нь газрын
    зураг дээр нуурыг дүрслэхэд ашиглагддаг өнгө юм
  norvégien: Lar deg velge bakgrunnsfarge. Tilgjengelige farger er hvitt, forskjellige
    blåtoner som minner om havfargen, samt gjennomsiktig. Den lyseste blåfargen som
    er tilgjengelig, er den som brukes til å representere innsjøer på kart
  néerlandais: Maakt het mogelijk om de achtergrondkleur te kiezen. Beschikbaar als
    kleuren zijn wit, diverse blauwtinten die min of meer lijken op de kleur van de
    zee, evenals transparant. Het lichtste blauw dat beschikbaar is, is degene die
    wordt gebruikt om meren op kaarten weer te geven
  népalais: पृष्ठभूमिको रंग छान्ने अनुमति दिन्छ। सेतो, समुद्रको रंगसँग मिल्दोजुल्दो
    विभिन्न निलो र पारदर्शी रंगहरू उपलब्ध छन्। उपलब्ध सबैभन्दा हल्का निलो नक्सामा
    तालहरू देखाउन प्रयोग गरिन्छ।
  ourdou: پس منظر کا رنگ منتخب کرنے کی اجازت دیتا ہے۔ سفید، مختلف نیلے رنگ جو سمندر
    کے رنگ سے ملتے جلتے ہیں، اور شفاف رنگ دستیاب ہیں۔ سب سے ہلکا نیلا نقشوں پر جھیلوں
    کی نمائندگی کے لیے استعمال ہوتا ہے۔
  ouzbek: Orqa fon rangini tanlash imkonini beradi. Oq, dengiz rangiga yaqin turli
    xil ko'k ranglar, shuningdek shaffof ranglar mavjud. Mavjud bo'lgan eng ochiq
    ko'k rang xaritalarda ko'llarni ifodalash uchun ishlatiladi
  pachto: د شاليد رنګ د انتخاب اجازه ورکوي. سپين، د سمندر رنګ ته نږدې مختلف نیلي رنګونه،
    او شفاف شتون لري. تر ټولو روښانه نیلي رنګ هغه دی چې په نقشه کې د جهيلونو د ښودلو
    لپاره کارول کیږي
  persan: به شما اجازه می دهد رنگ پس زمینه را انتخاب کنید. رنگ های سفید، آبی های مختلف
    نزدیک به رنگ دریا و همچنین شفاف در دسترس هستند. روشن ترین آبی موجود، آبی است که
    برای نشان دادن دریاچه ها در نقشه ها استفاده می شود
  polonais: Pozwala wybrać kolor tła. Dostępne są kolory biały, różne odcienie niebieskiego,
    zbliżone do koloru morza, a także przezroczysty. Najjaśniejszy dostępny niebieski
    to ten używany do przedstawiania jezior na mapach
  portugais: Permite escolher a cor de fundo. Estão disponíveis como cores o branco,
    diversos azuis mais ou menos próximos da cor do mar, bem como transparente. O
    azul mais claro disponível é aquele usado para representar lagos nos mapas
  roumain: Permite alegerea culorii de fundal. Sunt disponibile ca și culori alb,
    diverse nuanțe de albastru mai mult sau mai puțin apropiate de culoarea mării,
    precum și transparent. Albastrul cel mai deschis disponibil este cel folosit pentru
    a reprezenta lacurile pe hărți
  russe: Позволяет выбрать цвет фона. Доступны белый цвет, различные оттенки синего,
    более или менее близкие к цвету моря, а также прозрачный. Самый светлый доступный
    синий — тот, который используется для обозначения озер на картах
  serbo-croate: Omogućava odabir boje pozadine. Dostupne su boje bijela, razni plavi,
    više ili manje bliski boji mora, kao i prozirna. Najsvjetlija dostupna plava je
    ona koja se koristi za predstavljanje jezera na kartama
  slovaque: Umožňuje vybrať farbu pozadia. Dostupné farby sú biela, rôzne modré odtiene,
    viac-menej blízke farbe mora, ako aj priehľadná. Najsvetlejšia dostupná modrá
    je tá, ktorá sa používa na reprezentáciu jazier na mapách
  slovène: Omogoča izbiro barve ozadja. Na voljo so bela, različne modre barve, bolj
    ali manj podobne barvi morja, ter prozorna. Najsvetlejša modra, ki je na voljo,
    je tista, ki se uporablja za predstavitev jezer na zemljevidih
  suédois: Tillåter val av bakgrundsfärg. Tillgängliga färger är vitt, olika blå nyanser
    mer eller mindre lika havets färg, samt transparent. Den ljusaste blå nyansen
    som finns tillgänglig är den som används för att representera sjöar på kartor
  swahili: Inaruhusu kuchagua rangi ya usuli. Rangi zinazopatikana ni nyeupe, bluu
    mbalimbali karibu na rangi ya bahari, na pia uwazi. Bluu angavu zaidi inayopatikana
    ndiyo inayotumika kuwakilisha maziwa kwenye ramani
  tadjik: Барои интихоби ранги замина имкон медиҳад. Рангҳои сафед, кабудҳои гуногун,
    ки ба ранги баҳр наздиканд, ва инчунин шаффоф дастрасанд. Кабуди аз ҳама сабук
    барои тасвири кӯлҳо дар харитаҳо истифода мешавад
  tamoul: பின்புல நிறத்தைத் தேர்ந்தெடுக்கலாம். வெள்ளை, கடலின் நிறத்திற்கு நெருக்கமான
    பல நீலங்கள் மற்றும் வெளிப்படையானவை கிடைக்கின்றன. கிடைக்கக்கூடிய மிக இலகுவான நீலம்,
    வரைபடங்களில் ஏரிகளைக் குறிக்கப் பயன்படும் நீலம் ஆகும்
  tchèque: Umožňuje vybrat barvu pozadí. K dispozici jsou bílá barva, různé modré
    barvy více či méně podobné barvě moře a také transparentní. Nejsvětlejší dostupná
    modrá barva je ta, která se používá k reprezentaci jezer na mapách
  thaï: อนุญาตให้เลือกสีพื้นหลังได้ มีสีขาว สีฟ้าหลายเฉดใกล้เคียงกับสีทะเล และสีโปร่งใส
    สีฟ้าอ่อนที่สุดที่มีให้เลือกใช้คือสีที่ใช้แสดงทะเลสาบบนแผนที่
  tibétain: རྒྱབ་ལྗོངས་ཀྱི་ཚོས་མདོག་འདེམས་པར་བསྐུལ་བ། དཀར་པོ། རྒྱ་མཚོའི་ཁ་དོག་དང་ཅུང་ཉེ་བའི་སྔོན་པོ་སྣ་ཚོགས་དང་།
    མཐོང་ཐུབ་པའི་ཁ་དོག་བཅས་ཡོད། སྔོན་པོ་ཡང་ཤོས་ནི་ས་ཁྲའི་སྟེང་གི་མཚེའུ་མཚོན་པར་བེད་སྤྱོད་བྱེད།
  turc: Arka plan rengini seçmeye izin verir. Beyaz, deniz rengine az çok yakın çeşitli
    maviler ve şeffaf renkler mevcuttur. Mevcut en açık mavi, haritalarda gölleri
    temsil etmek için kullanılan renktir
  turkmène: Arka fonuň reňkini saýlamaga mümkinçilik berýär. Ak, deňziň reňkine gaty
    ýakyn dürli gök reňkler we şeýle hem aç-aýdyň reňkler elýeterlidir. Elýeterli
    iň açyk gök reňk kartalarda kölleri görkezmek üçin ulanylýar
  ukrainien: 'Дозволяє вибрати колір фону. Доступні такі кольори: білий, різні сині
    кольори, більш-менш близькі до кольору моря, а також прозорий. Найсвітліший доступний
    синій колір використовується для позначення озер на картах'
  vietnamien: Cho phép chọn màu nền. Các màu có sẵn là trắng, nhiều màu xanh lam khác
    nhau gần với màu biển, và trong suốt. Màu xanh lam nhạt nhất có sẵn là màu được
    sử dụng để đại diện cho các hồ trên bản đồ
  zoulou: Ivumela ukukhetha umbala wangemuva. Imibala ekhona imhlophe, imibala ehlukene
    eluhlaza okwesibhakabhaka ecishe ifane nombala wolwandle, kanye nokubonisa ngale.
    Oluhlaza okwesibhakabhaka olukhanya kakhulu olutholakalayo yilolo olusetshenziselwa
    ukukhombisa amachibi emabalazweni
? Permet de choisir si l'on souhaite publier l'entièreté des cartes ou seulement celles
  qui possède la granularité souhaitée. Veut-on par exemple publier une carte qui
  n'existe qu'au niveau régional si l'on souhaite des cartes au niveau départemental
  ?
: afrikaans: Laat 'n mens toe om te kies of 'n mens al die kaarte wil publiseer, of
    slegs dié met die verlangde granulariteit. Wil 'n mens byvoorbeeld 'n kaart publiseer
    wat slegs op streeksvlak bestaan as 'n mens kaarte op departementele vlak verlang?
  albanais: Mundëson zgjedhjen nëse dëshirohet të publikohen të gjitha hartat apo
    vetëm ato që kanë granularitetin e dëshiruar. Për shembull, a dëshirohet të publikohet
    një hartë që ekziston vetëm në nivel rajonal nëse kërkohen harta në nivel departamenti?
  allemand: Ermöglicht die Auswahl, ob alle Karten veröffentlicht werden sollen oder
    nur diejenigen, die die gewünschte Granularität aufweisen. Möchte man beispielsweise
    eine Karte veröffentlichen, die nur auf regionaler Ebene existiert, wenn man Karten
    auf Departementsebene wünscht?
  anglais: Allows choosing whether to publish the entire set of maps or only those
    with the desired granularity. For example, do we want to publish a map that only
    exists at the regional level if we want maps at the departmental level?
  arabe: يسمح باختيار ما إذا كنا نرغب في نشر جميع الخرائط أم فقط تلك التي لديها الدقة
    المطلوبة. على سبيل المثال، هل نريد نشر خريطة موجودة على المستوى الإقليمي فقط إذا
    كنا نريد خرائط على مستوى المحافظة؟
  arménien: Թույլ է տալիս ընտրել՝ հրապարակել քարտեզներն ամբողջությամբ, թե միայն այն
    քարտեզները, որոնք ունեն ցանկալի մանրամասնությունը։ Օրինակ՝ արդյո՞ք ցանկանում ենք
    հրապարակել քարտեզ, որը գոյություն ունի միայն մարզային մակարդակում, եթե ցանկանում
    ենք քարտեզներ գավառային մակարդակում։
  basque: Txartel guztiak edo nahi den granularitatea dutenak soilik argitaratu nahi
    diren aukeratzeko aukera ematen du. Adibidez, departamendu-mailako txartelak nahi
    badira, eskualde-mailan soilik existitzen den txartel bat argitaratu nahi al da?
  bengali: এটি নির্বাচন করতে দেয় যে কেউ সমস্ত মানচিত্র প্রকাশ করতে চায় নাকি শুধুমাত্র
    সেইগুলি যেগুলির পছন্দসই গ্রানুলারিটি রয়েছে। উদাহরণস্বরূপ, কেউ যদি বিভাগীয় স্তরের
    মানচিত্র চায় তবে আঞ্চলিক স্তরে বিদ্যমান একটি মানচিত্র প্রকাশ করতে চায় কিনা?
  birman: ဒေသန္တရအဆင့်မြေပုံကိုလိုချင်လျှင် တိုင်းဒေသကြီးအဆင့်သာရှိသော မြေပုံတစ်ခုကို
    ထုတ်ဝေလိုပါသလား။ မြေပုံတစ်ခုလုံးကို ထုတ်ဝေလိုသလား သို့မဟုတ် လိုချင်သောအသေးစိတ်အချက်အလက်များရှိသော
    မြေပုံများကိုသာ ထုတ်ဝေလိုသလား ရွေးချယ်နိုင်ပါသည်။
  breton: Gallout a reer dibab hag-eñ e fell embann an holl gartennoù pe reoù hepken
    hag a zo ganto ar c'hementad a c'hreun dre ar munud a c'houlenner. Da skouer,
    ha fellout a ra deomp embann ur gartenn n'eus anezhi nemet d'ar live rannvro ma
    fell deomp kaout kartennoù d'al live departamant?
  bulgare: Позволява да се избере дали да се публикуват всички карти или само тези,
    които имат желаната гранулираност. Например, искаме ли да публикуваме карта, която
    съществува само на регионално ниво, ако желаем карти на областно ниво?
  catalan: Permet triar si es vol publicar la totalitat dels mapes o només aquells
    que tenen la granularitat desitjada. Per exemple, volem publicar un mapa que només
    existeix a nivell regional si volem mapes a nivell departamental?
  corse: Permette di sceglie s'è da pubblicà tutte e carte o solu quessi chì anu a
    granularità desiderata. Vulemu, per esempiu, publicà una carta chì esiste solu
    à u livellu regiunale se si volenu carte à u livellu dipartimentale?
  coréen: 전체 지도를 게시할지, 아니면 원하는 세분성을 가진 지도만 게시할지 선택할 수 있습니다. 예를 들어, 도 단위 지도를 원할 때 광역
    단위로만 존재하는 지도를 게시하고 싶습니까?
  danois: Giver mulighed for at vælge, om man vil publicere alle kort eller kun dem,
    der har den ønskede granularitet. Skal man for eksempel publicere et kort, der
    kun findes på regionalt niveau, hvis man ønsker kort på nationalt niveau?
  espagnol: Permite elegir si se desea publicar la totalidad de los mapas o solo aquellos
    que poseen la granularidad deseada. ¿Se quiere, por ejemplo, publicar un mapa
    que solo existe a nivel regional si se desean mapas a nivel departamental?
  esperanto: Permesas elekti ĉu oni volas publikigi ĉiujn kartojn aŭ nur tiujn, kiuj
    havas la deziratan granularecon. Ĉu oni volas ekzemple publikigi karton, kiu ekzistas
    nur je regiona nivelo, se oni deziras kartojn je departementa nivelo?
  estonien: Võimaldab valida, kas avaldada kõik kaardid või ainult need, millel on
    soovitud detailsusaste. Kas näiteks soovitakse avaldada kaart, mis on olemas ainult
    regionaalsel tasandil, kui soovitakse kaarte maakonna tasandil?
  finnois: Mahdollistaa valinnan, julkaistaanko kaikki kartat vai ainoastaan ne, joilla
    on haluttu granulariteetti. Haluammeko esimerkiksi julkaista kartan, joka on olemassa
    vain alueellisella tasolla, jos haluamme karttoja departementtitasolla?
  français: Permet de choisir si l'on souhaite publier l'entièreté des cartes ou seulement
    celles qui possède la granularité souhaitée. Veut-on par exemple publier une carte
    qui n'existe qu'au niveau régional si l'on souhaite des cartes au niveau départemental
    ?
  gallois: Mae'n caniatáu dewis a ddylid cyhoeddi'r holl fapiau neu dim ond y rhai
    sydd â'r manylder dymunol. Er enghraifft, a ydym am gyhoeddi map sy'n bodoli ar
    lefel ranbarthol yn unig os ydym eisiau mapiau ar lefel sirol?
  grec: Επιτρέπει την επιλογή δημοσίευσης είτε όλων των χαρτών είτε μόνο αυτών που
    έχουν την επιθυμητή λεπτομέρεια. Θέλουμε, για παράδειγμα, να δημοσιεύσουμε έναν
    χάρτη που υπάρχει μόνο σε περιφερειακό επίπεδο αν θέλουμε χάρτες σε επίπεδο νομού;
  grec ancien: Ἐπιτρέπει διαλέξασθαι, εἴτε πᾶσαν τὴν χώραν δημοσιεύειν τις ἐθέλει,
    εἴτε μόνον ὅσας τὴν ἐπιθυμητὴν ἀκριβολογίαν ἔχουσιν. Βούλεται τις δημόσιον εἶναι
    χάρτην, ὃς μόνον κατὰ τὴν χώραν ὑπάρχει, ἐὰν κατὰ τὴν ἐπαρχίαν χάρτας ἐπιθυμῇ;
  géorgien: საშუალებას იძლევა, აირჩიოთ, გსურთ გამოაქვეყნოთ ყველა რუკა თუ მხოლოდ ის
    რუკები, რომლებსაც აქვთ სასურველი დეტალიზაცია. მაგალითად, გვინდა თუ არა გამოვაქვეყნოთ
    რუკა, რომელიც მხოლოდ რეგიონალურ დონეზე არსებობს, თუ დეპარტამენტის დონეზე გვჭირდება
    რუკები?
  hindi: यह चुनने की अनुमति देता है कि क्या कोई सभी मानचित्रों को प्रकाशित करना चाहता
    है या केवल उन मानचित्रों को जिनमें वांछित ग्रैन्युलैरिटी है। उदाहरण के लिए, क्या
    कोई ऐसा मानचित्र प्रकाशित करना चाहेगा जो केवल क्षेत्रीय स्तर पर मौजूद है यदि कोई
    विभागीय स्तर पर मानचित्र चाहता है?
  hongrois: Lehetővé teszi annak kiválasztását, hogy a teljes térképsort vagy csak
    a kívánt részletességű térképeket szeretnénk publikálni. Például akarunk-e publikálni
    egy olyan térképet, amely csak regionális szinten létezik, ha megyei szintű térképeket
    szeretnénk?
  indonésien: Memungkinkan untuk memilih apakah ingin menerbitkan semua peta atau
    hanya yang memiliki granularitas yang diinginkan. Contohnya, apakah kita ingin
    menerbitkan peta yang hanya ada di tingkat regional jika kita menginginkan peta
    di tingkat departemen?
  irlandais: Ligeann sé duit a roghnú más mian leat na léarscáileanna go léir a fhoilsiú
    nó díreach na cinn a bhfuil an gráinneacht inmhianaithe acu. Mar shampla, ar mhaith
    leat léarscáil nach bhfuil ann ach ar leibhéal réigiúnach a fhoilsiú má tá léarscáileanna
    de dhíth ar leibhéal na ranna?
  islandais: Gerir kleift að velja hvort birta eigi öll kortin eða bara þau sem hafa
    viðeigandi nákvæmni. Viltu til dæmis birta kort sem er aðeins til á landsvísu
    ef óskað er eftir kortum á héraðsstigi?
  italien: Permette di scegliere se pubblicare tutte le mappe o solo quelle che possiedono
    la granularità desiderata. Si vuole, ad esempio, pubblicare una mappa che esiste
    solo a livello regionale se si desiderano mappe a livello dipartimentale?
  japonais: 地図全体を公開するか、希望する粒度を持つ地図のみを公開するかを選択できます。例えば、都道府県レベルの地図が必要な場合に、地方レベルにしか存在しない地図を公開しますか？
  kazakh: Карталардың барлығын немесе тек қажетті дәлдікке ие карталарды жариялағымыз
    келетінін таңдауға мүмкіндік береді. Мысалы, егер бізге аудандық деңгейдегі карталар
    қажет болса, аймақтық деңгейде ғана бар картаны жариялағымыз келе ме?
  kirghize: Кайрадан карталарды жарыялоону каалайсызбы же каалаган майда-чүйдөсүнө
