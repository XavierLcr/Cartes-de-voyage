    kartalary islesek, diňe welaýat derejesinde bar bolan kartany neşir etmek isleýärismi?
  ukrainien: Дозволяє вибирати, чи бажаєте ви опублікувати всі карти або лише ті,
    які мають бажану деталізацію. Наприклад, чи хочемо ми опублікувати карту, яка
    існує лише на регіональному рівні, якщо нам потрібні карти на рівні департаменту?
  vietnamien: Cho phép chọn đăng tải toàn bộ bản đồ hay chỉ những bản đồ có độ chi
    tiết mong muốn. Ví dụ, có nên đăng bản đồ chỉ tồn tại ở cấp độ vùng nếu muốn có
    bản đồ ở cấp độ tỉnh/thành phố không?
  zoulou: Ivumela ukuthi kukhethwe ukuthi ngabe kufanele yini ukushicilela wonke amamephu
    noma labo kuphela abanegranularity oyifunayo. Ngokwesibonelo, ingabe sifuna ukushicilela
    imephu ekhona kuphela ezingeni lesifunda uma sifuna amamephu ezingeni lesifunda?
? Pour un pays donné, si des départements sont cochés, ils sont prioritaires sur les
  régions cochées. Dans ce cas, la liste des régions visitées est automatiquement
  reconstituée à partir de la liste des départements. Il n'est donc plus nécessaire
  de cocher les régions visitées (les régions peuvent rester cochées mais ne seront
  pas prises en compte)
: afrikaans: Vir 'n gegewe land, indien departemente gemerk is, geniet hulle voorkeur
    bo gemerkte streke. In hierdie geval word die lys van besoekte streke outomaties
    herbou vanaf die lys van departemente. Dit is dus nie meer nodig om die besoekte
    streke te merk nie (die streke kan gemerk bly, maar sal nie in ag geneem word
    nie)
  albanais: Për një vend të caktuar, nëse zgjidhen departamentet, ato kanë përparësi
    mbi rajonet e zgjedhura. Në këtë rast, lista e rajoneve të vizituara rindërtohet
    automatikisht nga lista e departamenteve. Prandaj, nuk është më e nevojshme të
    zgjidhni rajonet e vizituara (rajonet mund të mbeten të zgjedhura, por nuk do
    të merren parasysh)
  allemand: 'Für ein gegebenes Land gilt: Wenn Departements ausgewählt sind, haben
    diese Vorrang vor den ausgewählten Regionen. In diesem Fall wird die Liste der
    besuchten Regionen automatisch aus der Liste der Departements neu erstellt. Es
    ist daher nicht mehr notwendig, die besuchten Regionen anzukreuzen (die Regionen
    können angekreuzt bleiben, werden aber nicht berücksichtigt)'
  anglais: For a given country, if departments are selected, they take priority over
    selected regions. In this case, the list of visited regions is automatically rebuilt
    from the list of departments. It is therefore no longer necessary to select the
    visited regions (the regions can remain selected but will not be taken into account)
  arabe: بالنسبة لبلد معين، إذا تم تحديد أقسام، فإنها تكون ذات أولوية على المناطق
    المحددة. في هذه الحالة، يتم إعادة تكوين قائمة المناطق التي تمت زيارتها تلقائيًا
    من قائمة الأقسام. لذلك، لم يعد من الضروري تحديد المناطق التي تمت زيارتها (يمكن
    أن تظل المناطق محددة ولكن لن يتم أخذها في الاعتبار)
  arménien: 'Տվյալ երկրի համար, եթե նշված են մարզեր, ապա դրանք գերակա են նշված շրջանների
    նկատմամբ: Այս դեպքում այցելված շրջանների ցանկը ավտոմատ կերպով վերականգնվում է
    մարզերի ցանկից: Հետևաբար, այլևս անհրաժեշտ չէ նշել այցելված շրջանները (շրջանները
    կարող են մնալ նշված, բայց հաշվի չեն առնվի):'
  basque: Herrialde jakin batentzat, departamenduak markatuta badaude, lehentasuna
    dute markatutako eskualdeen aldean. Kasu horretan, bisitatutako eskualdeen zerrenda
    automatikoki berreraikitzen da departamenduen zerrendatik abiatuta. Beraz, ez
    da beharrezkoa bisitatutako eskualdeak markatzea (eskualdeek markatuta jarrai
    dezakete, baina ez dira kontuan hartuko)
  bengali: কোনো একটি দেশের জন্য, যদি বিভাগগুলি চিহ্নিত করা হয়, তবে সেগুলি চিহ্নিত
    অঞ্চলগুলির চেয়ে অগ্রাধিকার পাবে। সেক্ষেত্রে, পরিদর্শন করা অঞ্চলগুলির তালিকা স্বয়ংক্রিয়ভাবে
    বিভাগগুলির তালিকা থেকে পুনর্গঠন করা হবে। তাই পরিদর্শন করা অঞ্চলগুলি চিহ্নিত করার
    আর প্রয়োজন নেই (অঞ্চলগুলি চিহ্নিত থাকতে পারে কিন্তু সেগুলি বিবেচনা করা হবে না)।
  birman: သတ်မှတ်နိုင်ငံတစ်ခုအတွက်၊ ရွေးချယ်ထားသောတိုင်းဒေသကြီးများထက် ရွေးချယ်ထားသောခရိုင်များကို
    ဦးစားပေးပါသည်။ ထိုသို့ဖြစ်လျှင် ခရိုင်များစာရင်းမှ သွားရောက်လည်ပတ်သောဒေသများစာရင်းကို
    အလိုအလျောက်ပြန်လည်တည်ဆောက်မည်ဖြစ်သည်။ ထို့ကြောင့် သွားရောက်လည်ပတ်သောတိုင်းဒေသကြီးများကို
    ရွေးချယ်ရန်မလိုအပ်တော့ပါ (ဒေသများကို ရွေးချယ်ထားနိုင်သော်လည်း ထည့်သွင်းစဉ်းစားမည်မဟုတ်ပါ)။
  breton: Evit ur vro resis, ma vez merket departamantoù, ez int priorelezh war ar
    rannvroioù merket. Er c'heñver-se, roll ar rannvroioù a vez gweladennet a vez
    adsavet ent emgefre diwar roll an departamantoù. N'eo ket ret merkañ ar rannvroioù
    a vez gweladennet ken neuze (gallout a ra ar rannvroioù chom merket met ne vint
    ket kemeret e kont)
  bulgare: За дадена държава, ако са отметнати департаменти, те имат приоритет пред
    отметнатите региони. В този случай, списъкът с посетените региони автоматично
    се генерира на базата на списъка с департаменти. Следователно, вече не е необходимо
    да се отмятат посетените региони (регионите могат да останат отметнати, но няма
    да бъдат взети предвид)
  catalan: Per a un país determinat, si es marquen departaments, tenen prioritat sobre
    les regions marcades. En aquest cas, la llista de regions visitades es reconstrueix
    automàticament a partir de la llista de departaments. Per tant, ja no cal marcar
    les regions visitades (les regions poden quedar marcades però no es tindran en
    compte)
  corse: Per un paese datu, s’è i dipartimenti sò marcati, sò prioritarii nantu à
    e rigione marcate. In stu casu, a lista di e rigione visitate hè ricustituita
    automaticamente da a lista di i dipartimenti. Ùn hè dunque più necessariu di marcà
    e rigione visitate (e rigione ponu restà marcate ma ùn seranu micca pigliate in
    contu)
  coréen: 특정 국가에서, 도가 선택되면, 선택된 지역보다 우선순위가 높습니다. 이 경우, 방문한 지역 목록은 도 목록을 기반으로 자동으로
    재구성됩니다. 따라서 방문한 지역을 선택할 필요가 없습니다 (지역은 선택된 상태로 남아 있을 수 있지만 고려되지 않습니다)
  danois: For et givet land gælder det, at hvis departementer er afkrydsede, har de
    prioritet over afkrydsede regioner. I så fald bliver listen over besøgte regioner
    automatisk gendannet ud fra listen over departementer. Det er derfor ikke længere
    nødvendigt at afkrydse de besøgte regioner (regionerne kan forblive afkrydsede,
    men vil ikke blive taget i betragtning)
  espagnol: Para un país dado, si se seleccionan departamentos, estos tienen prioridad
    sobre las regiones seleccionadas. En este caso, la lista de regiones visitadas
    se reconstruye automáticamente a partir de la lista de departamentos. Por lo tanto,
    ya no es necesario seleccionar las regiones visitadas (las regiones pueden permanecer
    seleccionadas, pero no se tendrán en cuenta)
  esperanto: Por difinita lando, se departementoj estas markitaj, ili havas prioritaton
    super la markitaj regionoj. En tiu kazo, la listo de vizititaj regionoj estas
    aŭtomate rekonstruita el la listo de departementoj. Do ne plu necesas marki la
    vizititajn regionojn (la regionoj povas resti markitaj sed ne estos konsiderataj)
  estonien: Antud riigi puhul, kui on märgitud departemangud, on need eelistatud märgitud
    regioonide ees. Sellisel juhul koostatakse külastatud regioonide nimekiri automaatselt
    departemangude nimekirja alusel. Seega ei ole enam vaja külastatud regioone märkida
    (regioonid võivad jääda märgistatuks, kuid neid ei arvestata)
  finnois: Jos tietylle maalle on valittu departementteja, ne ovat etusijalla valittuihin
    alueisiin nähden. Tässä tapauksessa vieraillut alueet -luettelo muodostetaan automaattisesti
    departementtien luettelosta. Tämän vuoksi vierailtuja alueita ei tarvitse enää
    valita (alueet voivat pysyä valittuina, mutta niitä ei oteta huomioon)
  français: Pour un pays donné, si des départements sont cochés, ils sont prioritaires
    sur les régions cochées. Dans ce cas, la liste des régions visitées est automatiquement
    reconstituée à partir de la liste des départements. Il n'est donc plus nécessaire
    de cocher les régions visitées (les régions peuvent rester cochées mais ne seront
    pas prises en compte)
  gallois: Ar gyfer gwlad benodol, os oes adrannau wedi'u ticio, mae ganddynt flaenoriaeth
    dros ranbarthau wedi'u ticio. Yn yr achos hwn, mae rhestr o ranbarthau a ymwelwyd
    â hwy yn cael ei hail-lunio'n awtomatig o restr yr adrannau. Felly, nid oes angen
    ticio'r rhanbarthau a ymwelwyd â hwy mwyach (gall y rhanbarthau aros wedi'u ticio
    ond ni chânt eu hystyried)
  grec: Για μια δεδομένη χώρα, εάν επιλεγούν νομοί, έχουν προτεραιότητα έναντι των
    επιλεγμένων περιφερειών. Σε αυτήν την περίπτωση, η λίστα των επισκέψιμων περιφερειών
    ανασυντίθεται αυτόματα από τη λίστα των νομών. Επομένως, δεν είναι πλέον απαραίτητο
    να επιλέξετε τις επισκέψιμες περιφέρειες (οι περιφέρειες μπορούν να παραμείνουν
    επιλεγμένες αλλά δεν θα ληφθούν υπόψη)
  grec ancien: Εἰς τὴν δοθεῖσαν χώραν, ἐὰν ἐπιλεγῶσιν ἐπαρχίαι, αὗται προτέμνονται
    τῶν ἐπιλεγείσων περιφερειῶν. Ἐν τούτῳ τῷ περιπτώματι, ὁ κατάλογος τῶν ἐπισκεφθεισῶν
    περιφερειῶν ἀνασυντίθεται αὐτομάτως ἐκ τοῦ καταλόγου τῶν ἐπαρχιῶν. Οὐκέτι οὖν
    ἀνάγκη ἐστὶν ἐπιλέγειν τὰς ἐπισκεφθείσας περιφερείας (αἱ δὲ περιφέρειαι ἐπιλελεγμέναι
    μένουσαι οὐ λαμβάνονται ὑπʼ ὄψιν)
  géorgien: მოცემული ქვეყნისთვის, თუ მონიშნულია დეპარტამენტები, მათ აქვთ პრიორიტეტი
    მონიშნულ რეგიონებზე. ამ შემთხვევაში, მონახულებული რეგიონების სია ავტომატურად ხელახლა
    იქმნება დეპარტამენტების სიის მიხედვით. შესაბამისად, აღარ არის საჭირო მონახულებული
    რეგიონების მონიშვნა (რეგიონები შეიძლება დარჩეს მონიშნული, მაგრამ მხედველობაში
    არ მიიღება)
  hindi: किसी दिए गए देश के लिए, यदि विभागों को चिह्नित किया गया है, तो उन्हें चिह्नित
    क्षेत्रों पर प्राथमिकता दी जाएगी। उस स्थिति में, देखे गए क्षेत्रों की सूची स्वचालित
    रूप से विभागों की सूची से फिर से बनाई जाती है। इसलिए देखे गए क्षेत्रों को चिह्नित
    करने की अब आवश्यकता नहीं है (क्षेत्र चिह्नित रह सकते हैं लेकिन उन्हें ध्यान में
    नहीं रखा जाएगा)।
  hongrois: Adott ország esetén, ha be vannak jelölve megyék, azok prioritást élveznek
    a bejelölt régiókkal szemben. Ebben az esetben a meglátogatott régiók listája
    automatikusan újraépül a megyék listájából. Ezért nem szükséges többé bejelölni
    a meglátogatott régiókat (a régiók bejelölve maradhatnak, de nem lesznek figyelembe
    véve)
  indonésien: Untuk suatu negara tertentu, jika departemen dicentang, mereka akan
    diprioritaskan daripada wilayah yang dicentang. Dalam kasus ini, daftar wilayah
    yang dikunjungi secara otomatis disusun ulang dari daftar departemen. Oleh karena
    itu, tidak perlu lagi mencentang wilayah yang dikunjungi (wilayah dapat tetap
    dicentang tetapi tidak akan diperhitungkan)
  irlandais: I gcás tíre áirithe, má tá ranna ticáilte, tá siad chun tosaigh ar réigiúin
    ticáilte. Sa chás seo, déantar liosta na réigiún ar tugadh cuairt orthu a athdhéanamh
    go huathoibríoch ó liosta na ranna. Ní gá, dá bhrí sin, na réigiúin ar tugadh
    cuairt orthu a thiceáil a thuilleadh (féadfaidh na réigiúin fanacht ticáilte ach
    ní chuirfear san áireamh iad)
  islandais: Fyrir tiltekið land, ef deildir eru hakaðar við, hafa þær forgang fram
    yfir hakað við svæði. Í því tilfelli er listi yfir heimsótt svæði sjálfkrafa endurgerður
    út frá listanum yfir deildir. Því er ekki lengur nauðsynlegt að haka við heimsótt
    svæði (svæðin geta verið áfram hakað við en verða ekki tekin með í reikninginn)
  italien: Per un determinato paese, se sono selezionati dei dipartimenti, questi
    hanno la priorità sulle regioni selezionate. In questo caso, l'elenco delle regioni
    visitate viene automaticamente ricostituito a partire dall'elenco dei dipartimenti.
    Non è quindi più necessario selezionare le regioni visitate (le regioni possono
    rimanere selezionate ma non saranno prese in considerazione)
  japonais: 特定の国において、都道府県が選択されている場合、選択されている地方よりも都道府県が優先されます。この場合、訪問する地方のリストは、都道府県のリストから自動的に再構成されます。したがって、訪問する地方を選択する必要はもうありません（地方が選択されたままでも、考慮されません）。
  kazakh: Белгілі бір ел үшін, егер департаменттер белгіленсе, олар белгіленген аймақтардан
    басым болады. Бұл жағдайда, барған аймақтардың тізімі департаменттердің тізімінен
    автоматты түрде қайта құрастырылады. Сондықтан барған аймақтарды белгілеудің қажеті
    жоқ (аймақтар белгіленген күйінде қалуы мүмкін, бірақ есепке алынбайды)
  kirghize: Берилген өлкө үчүн, эгерде бөлүмдөр белгиленген болсо, алар белгиленген
    аймактарга артыкчылык берилет. Бул учурда, барган аймактардын тизмеси бөлүмдөрдүн
    тизмесинен автоматтык түрдө түзүлөт. Ошентип, барган аймактарды белгилөө талап
    кылынбайт (аймактар белгиленип калышы мүмкүн, бирок алар эсепке алынбайт)
  kurde: Bo welatekî diyarkirî, eger departman hatibin nîşankirin, ew ji herêman pêştir
    tên hesibandin. Di vê rewşê de, lîsteya herêmên serdanê bixweber ji lîsteya departmanan
    tê avakirin. Ji ber vê yekê êdî hewce nake ku herêmên serdanê bên nîşankirin (herêm
    dikarin nîşankirî bimînin lê hesab li ser wan nayê kirin)
  latin: Pro data regione, si provinciae notatae sunt, illae praeponuntur regionibus
    notatis. Hoc in casu, index regionum visitatarum sponte reficitur ex indice provinciarum.
    Non iam ergo necesse est regiones visitatas notare (regiones notatae manere possunt
    sed non considerabuntur)
  letton: Attiecībā uz konkrētu valsti, ja ir atzīmētas nodaļas, tās ir prioritāras
    pār atzīmētiem reģioniem. Tādā gadījumā apmeklēto reģionu saraksts tiek automātiski
    rekonstruēts no nodaļu saraksta. Tāpēc vairs nav nepieciešams atzīmēt apmeklētos
    reģionus (reģioni var palikt atzīmēti, bet tie netiks ņemti vērā)
  lituanien: Atsižvelgiant į konkrečią šalį, jei pažymėti departamentai, jie yra prioritetiniai,
    palyginti su pažymėtais regionais. Tokiu atveju lankomų regionų sąrašas automatiškai
    sudaromas iš departamentų sąrašo. Todėl nebereikia žymėti lankomų regionų (regionai
    gali likti pažymėti, bet į juos nebus atsižvelgiama)
  luxembourgeois: Fir e bestëmmt Land, wa Departementer ugekräizt sinn, hunn si Prioritéit
    virun den ugekräizte Regiounen. An deem Fall gëtt d'Lëscht vun de besichte Regiounen
    automatesch aus der Lëscht vun den Departementer rekonstruéiert. Et ass also net
    méi néideg d'besichte Regiounen unzekräizen (d'Regioune kënnen ugekräizt bleiwen,
    ginn awer net berécksichtegt)
  macédonien: За дадена земја, ако се избрани одделенија, тие имаат приоритет пред
    избраните региони. Во овој случај, списокот на посетени региони автоматски се
    реконструира од списокот на одделенија. Затоа, повеќе не е потребно да се избираат
    посетените региони (регионите можат да останат избрани, но нема да бидат земени
    предвид)
  malais: Untuk sesebuah negara, jika jabatan dipilih, jabatan akan diutamakan berbanding
    kawasan yang dipilih. Dalam kes ini, senarai kawasan yang dilawati akan dibina
    semula secara automatik daripada senarai jabatan. Oleh itu, kawasan yang dilawati
    tidak perlu lagi dipilih (kawasan boleh kekal dipilih tetapi tidak akan diambil
    kira)
  malgache: Raha misy firenena iray, raha misy departemanta voamarika, dia laharam-pahamehana
    izy ireo raha oharina amin'ny faritra voamarika. Amin'izay fotoana izay, ny lisitry
    ny faritra notsidihina dia havaozina ho azy avy amin'ny lisitry ny departemanta.
    Noho izany, tsy ilaina intsony ny manamarika ny faritra notsidihina (mety hijanona
    ho voamarika ny faritra fa tsy horaisina an-tsaina)
  maltais: Għal pajjiż partikolari, jekk jiġu ċċekkjati dipartimenti, dawn ikollhom
    prijorità fuq ir-reġjuni ċċekkjati. F'dan il-każ, il-lista tar-reġjuni li żaru
    tiġi rikostitwita awtomatikament mil-lista tad-dipartimenti. Għalhekk, m'hemmx
    aktar bżonn li jiġu ċċekkjati r-reġjuni li żaru (ir-reġjuni jistgħu jibqgħu ċċekkjati
    iżda ma jitqisux)
  mandarin standard: 对于特定国家，如果选择了省份，则省份的优先级高于所选地区。在这种情况下，访问的地区列表将自动从省份列表重新构建。因此，不再需要选择访问的地区（地区可以保持选中状态，但不会被考虑在内）。
  mongol: Өгөгдсөн улсын хувьд хэрэв хэлтсүүдийг тэмдэглэсэн бол тэдгээр нь бүсүүдээс
    илүү давуу эрхтэй. Энэ тохиолдолд, айлчилсан бүсүүдийн жагсаалтыг хэлтсийн жагсаалтаас
    автоматаар дахин бүрдүүлнэ. Иймд айлчилсан бүсүүдийг тэмдэглэх шаардлагагүй (бүсүүдийг
    тэмдэглэсэн хэвээр байж болох ч харгалзахгүй)
  norvégien: For et gitt land, hvis fylker er valgt, har de prioritet over valgte
    regioner. I så fall vil listen over besøkte regioner automatisk bli rekonstruert
    fra listen over fylker. Det er derfor ikke lenger nødvendig å velge de besøkte
    regionene (regionene kan forbli valgt, men vil ikke bli tatt i betraktning)
  néerlandais: Voor een gegeven land geldt dat, indien departementen zijn aangevinkt,
    deze prioriteit hebben boven de aangevinkte regio's. In dat geval wordt de lijst
    van bezochte regio's automatisch samengesteld op basis van de lijst van departementen.
    Het is dan niet meer nodig om de bezochte regio's aan te vinken (de regio's kunnen
    aangevinkt blijven, maar worden niet meegenomen)
  népalais: 'कुनै पनि देशको लागि, यदि विभागहरू चयन गरिएका छन् भने, ती चयन गरिएका क्षेत्रहरू
    भन्दा प्राथमिकतामा पर्छन्। यस्तो अवस्थामा, भ्रमण गरिएका क्षेत्रहरूको सूची विभागहरूको
    सूचीबाट स्वचालित रूपमा पुन: निर्माण गरिन्छ। त्यसैले, भ्रमण गरिएका क्षेत्रहरू चयन
    गर्न आवश्यक पर्दैन (क्षेत्रहरू चयन गरिएका रहन सक्छन् तर गणना गरिने छैन)।'
  ourdou: کسی ملک کے لیے، اگر محکموں کو نشان زد کیا جاتا ہے، تو انہیں نشان زدہ علاقوں
    پر ترجیح دی جاتی ہے۔ اس صورت میں، دیکھے گئے علاقوں کی فہرست خود بخود محکموں کی
    فہرست سے دوبارہ بنائی جاتی ہے۔ اس لیے دیکھے گئے علاقوں کو نشان زد کرنے کی مزید
    ضرورت نہیں ہے (علاقے نشان زد رہ سکتے ہیں لیکن ان پر غور نہیں کیا جائے گا)۔
  ouzbek: Muayyan bir mamlakat uchun, agar departamentlar belgilangan bo'lsa, ular
    belgilangan viloyatlardan ustun turadi. Bunday holda, tashrif buyurilgan viloyatlar
    ro'yxati avtomatik ravishda departamentlar ro'yxatidan qayta tuziladi. Shuning
    uchun tashrif buyurilgan viloyatlarni belgilashga hojat yo'q (viloyatlar belgilangan
    bo'lishi mumkin, lekin hisobga olinmaydi)
  pachto: د یو ورکړل شوي هیواد لپاره، که چیرې ریاستونه په نښه شوي وي، دوی د سیمو په
    پرتله لومړیتوب لري چې په نښه شوي وي. په دې حالت کې، د لیدل شویو سیمو لیست په اوتومات
    ډول د ریاستونو له لیست څخه جوړیږي. نو د لیدل شویو سیمو په نښه کولو ته نور اړتیا
    نشته (سیمې ممکن په نښه شوې پاتې شي مګر په پام کې نه نیول کیږي)
  persan: برای یک کشور مشخص، اگر استان‌ها انتخاب شده باشند، نسبت به مناطق انتخاب شده
    اولویت دارند. در این صورت، فهرست مناطق بازدید شده به طور خودکار از فهرست استان‌ها
    بازسازی می‌شود. بنابراین، دیگر نیازی به انتخاب مناطق بازدید شده نیست (مناطق می‌توانند
    انتخاب شده باقی بمانند، اما در نظر گرفته نمی‌شوند)
  polonais: Dla danego kraju, jeśli zaznaczono departamenty, mają one priorytet nad
    zaznaczonymi regionami. W takim przypadku lista odwiedzonych regionów jest automatycznie
    rekonstruowana na podstawie listy departamentów. Nie ma więc potrzeby zaznaczania
    odwiedzonych regionów (regiony mogą pozostać zaznaczone, ale nie będą brane pod
    uwagę)
  portugais: Para um país específico, se departamentos forem selecionados, eles têm
    prioridade sobre as regiões selecionadas. Nesse caso, a lista de regiões visitadas
    é automaticamente reconstruída a partir da lista de departamentos. Portanto, não
    é mais necessário selecionar as regiões visitadas (as regiões podem permanecer
    selecionadas, mas não serão consideradas)
  roumain: Pentru o țară dată, dacă sunt bifate departamente, acestea au prioritate
    față de regiunile bifate. În acest caz, lista regiunilor vizitate este reconstruită
    automat din lista departamentelor. Prin urmare, nu mai este necesar să bifați
    regiunile vizitate (regiunile pot rămâne bifate, dar nu vor fi luate în considerare)
  russe: Для данной страны, если выбраны департаменты, они имеют приоритет над выбранными
    регионами. В этом случае, список посещённых регионов автоматически перестраивается
    на основе списка департаментов. Поэтому больше нет необходимости выбирать посещённые
    регионы (регионы могут оставаться выбранными, но не будут учитываться)
  serbo-croate: Za datu zemlju, ako su označeni departmani, oni imaju prioritet nad
    označenim regijama. U tom slučaju, lista posjećenih regija se automatski rekonstruira
    iz liste departmana. Stoga više nije potrebno označavati posjećene regije (regije
    mogu ostati označene, ali se neće uzimati u obzir)
  slovaque: Pre danú krajinu, ak sú zaškrtnuté departementy, majú prednosť pred zaškrtnutými
    regiónmi. V takom prípade sa zoznam navštívených regiónov automaticky vytvorí
    zo zoznamu departementov. Preto už nie je potrebné zaškrtávať navštívené regióny
    (regióny môžu zostať zaškrtnuté, ale nebudú sa brať do úvahy)
  slovène: Za dano državo velja, da imajo, če so označeni departmaji, ti prednost
    pred označenimi regijami. V tem primeru se seznam obiskanih regij samodejno rekonstruira
    iz seznama departmajev. Zato ni več treba označevati obiskanih regij (regije lahko
    ostanejo označene, vendar se jih ne bo upoštevalo)
  suédois: För ett givet land gäller att om departement är markerade, prioriteras
    de framför markerade regioner. I så fall återskapas automatiskt listan över besökta
    regioner från listan över departement. Det är därför inte längre nödvändigt att
    markera de besökta regionerna (regionerna kan förbli markerade men kommer inte
    att beaktas)
  swahili: Kwa nchi husika, ikiwa idara zimechaguliwa, zina kipaumbele kuliko mikoa
    iliyochaguliwa. Katika hali hiyo, orodha ya mikoa iliyotembelewa itaundwa upya
    moja kwa moja kutoka kwenye orodha ya idara. Kwa hivyo, hakuna haja ya kuchagua
    mikoa iliyotembelewa tena (mikoa inaweza kubaki imechaguliwa lakini haitazingatiwa)
  tadjik: Барои кишвари додашуда, агар шӯъбаҳо қайд карда шаванд, онҳо аз минтақаҳои
    қайдшуда афзалият доранд. Дар ин ҳолат, рӯйхати минтақаҳои боздидшуда аз рӯйхати
    шӯъбаҳо ба таври автоматикӣ аз нав сохта мешавад. Аз ин рӯ, дигар лозим нест,
    ки минтақаҳои боздидшударо қайд кунед (минтақаҳо метавонанд қайдшуда боқӣ монанд,
    аммо ба назар гирифта намешаванд)
  tamoul: ஒரு குறிப்பிட்ட நாட்டிற்கு, சில துறைகள் குறிக்கப்பட்டிருந்தால், குறிக்கப்பட்ட
    பிரதேசங்களை விட அவை முக்கியமானவை. அந்த சூழ்நிலையில், பார்வையிடப்பட்ட பிரதேசங்களின்
    பட்டியல், துறைகளின் பட்டியலிலிருந்து தானாகவே உருவாக்கப்படும். ஆகவே பார்வையிடப்பட்ட
    பிரதேசங்களை குறிக்க வேண்டிய அவசியமில்லை (பிரதேசங்கள் குறிக்கப்பட்டிருக்கலாம் ஆனால்
    அவை கணக்கில் எடுத்துக்கொள்ளப்பட மாட்டாது)
  tchèque: Pro danou zemi platí, že pokud jsou zaškrtnuty departementy, mají přednost
    před zaškrtnutými regiony. V takovém případě je seznam navštívených regionů automaticky
    sestaven ze seznamu departementů. Proto již není nutné zaškrtávat navštívené regiony
    (regiony mohou zůstat zaškrtnuté, ale nebudou brány v úvahu)
  thaï: สำหรับประเทศที่กำหนด หากมีการเลือกจังหวัด จังหวัดเหล่านั้นจะมีความสำคัญเหนือกว่าภูมิภาคที่เลือก
    ในกรณีนี้ รายการภูมิภาคที่เยี่ยมชมจะถูกสร้างขึ้นใหม่โดยอัตโนมัติจากรายการจังหวัด
    ดังนั้นจึงไม่จำเป็นต้องเลือกภูมิภาคที่เยี่ยมชมอีกต่อไป (ภูมิภาคอาจยังคงถูกเลือกอยู่
    แต่จะไม่ถูกนำมาพิจารณา)
  tibétain: ཡུལ་ཁོངས་ངེས་ཅན་ཞིག་ལ་ཆ་བཞག་ན། གལ་ཏེ་སྡེ་ཁག་ལ་རྟགས་བརྒྱབ་ཡོད་ན། དེ་དག་ས་ཁུལ་ལ་རྟགས་བརྒྱབ་པ་ལས་གཙོ་བོར་བརྩི་དགོས།
    གནས་སྟངས་འདིའི་ནང་སྡེ་ཁག་གི་ཐོ་ཡིག་ནས་ས་ཁུལ་ལ་བསྐྱར་དུ་ལྟ་སྐོར་བྱེད་པའི་ཐོ་ཡིག་རང་འགུལ་གྱིས་བསྐྱར་སྒྲིག་བྱེད་དགོས།
    དེར་བརྟེན་ས་ཁུལ་ལ་ལྟ་སྐོར་བྱེད་མཁན་ཚོར་རྟགས་རྒྱག་མི་དགོས (ས་ཁུལ་ལ་རྟགས་བརྒྱབ་ནའང་འགྲིག་མོད།
    འོན་ཀྱང་བརྩི་མི་ལེན་ནོ)།
  turc: Belirli bir ülke için, eğer iller işaretlenmişse, işaretlenmiş bölgelere göre
    önceliklidir. Bu durumda, ziyaret edilen bölgelerin listesi otomatik olarak iller
    listesinden yeniden oluşturulur. Bu nedenle, ziyaret edilen bölgeleri işaretlemeye
    gerek kalmaz (bölgeler işaretli kalabilir ancak dikkate alınmaz)
  turkmène: Bellenen bir ýurt üçin, eger bölümler bellenen bolsa, olar sebitlerden
    ileri tutulýar. Şeýle ýagdaýda, barylan sebitleriň sanawy awtomatiki usulda bölümleriň
    sanawyndan täzeden düzülýär. Şonuň üçin barylan sebitleri bellemek zerurlygy ýok
    (sebitler bellenen bolup biler, ýöne olar hasaba alynmaz)
  ukrainien: Для заданої країни, якщо відмічено департаменти, вони мають пріоритет
    над відміченими регіонами. У цьому випадку, список відвіданих регіонів автоматично
    відновлюється зі списку департаментів. Тому більше немає потреби відмічати відвідані
    регіони (регіони можуть залишатися відміченими, але не будуть враховуватися)
  vietnamien: Đối với một quốc gia cụ thể, nếu các tỉnh được chọn, chúng sẽ được ưu
    tiên hơn các vùng được chọn. Trong trường hợp này, danh sách các vùng đã ghé thăm
    sẽ tự động được tạo lại từ danh sách các tỉnh. Do đó, không cần thiết phải chọn
    các vùng đã ghé thăm nữa (các vùng có thể vẫn được chọn nhưng sẽ không được tính
    đến)
  zoulou: Ezweni elinikeziwe, uma iminyango imakiwe, ibaluleke kakhulu kunezifunda
    ezimakiwe. Kulokhu, uhlu lwezifunda ezivakashelwayo lwakhiwa kabusha ngokuzenzakalelayo
    kusuka ohlwini lweminyango. Ngakho-ke akusadingeki ukuthi kumakwe izifunda ezivakashelwayo
    (izifunda zingahlala zimakiwe kodwa ngeke zicatshangelwe)
