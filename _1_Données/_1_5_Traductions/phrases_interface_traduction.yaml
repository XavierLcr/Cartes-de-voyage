  thaï: อนุญาตให้เลือกว่าจะเผยแพร่แผนที่ทั้งหมดหรือเฉพาะแผนที่ที่มีรายละเอียดตามที่ต้องการเท่านั้น
    ตัวอย่างเช่น หากต้องการแผนที่ระดับจังหวัด จะต้องการเผยแพร่แผนที่ที่มีอยู่เฉพาะในระดับภูมิภาคหรือไม่
  tibétain: ས་ཁྲ་ཡོངས་རྫོགས་སྤེལ་འདོད་ཡོད་མེད་དམ་ཡང་ན་དམིགས་འབེན་གྱི་ཚད་གཞི་དང་མཐུན་པའི་ས་ཁྲ་ཁོ་ན་སྤེལ་འདོད་ཡོད་མེད་འདེམས་ཆོག
    དཔེར་ན། ང་ཚོས་ས་ཁྲ་རྫོང་ཁོངས་ཀྱི་ཆུ་ཚད་དགོས་ཚེ་ས་ཁྲ་ས་ཁུལ་གྱི་ཆུ་ཚད་ཁོ་ནར་ཡོད་པ་ཞིག་སྤེལ་འདོད་ཡོད་དམ།
  turc: Haritaların tamamının mı yoksa yalnızca istenen ayrıntı düzeyine sahip olanların
