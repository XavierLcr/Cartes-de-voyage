  arménien: 'Վերագործարկեք միջերեսը և այցելված երկրների ցանկը: Խնդրում ենք ստուգել,
    որ պահպանել եք ընթացիկ կարգավորումները նախքան այս կոճակը սեղմելը:'
  basque: Berrezarri interfazea eta bisitatutako herrialdeen zerrenda. Mesedez, egiaztatu
    uneko parametroak gorde dituzula botoi honetan klik egin aurretik
  bengali: ইন্টারফেস এবং দেখা দেশগুলির তালিকা রিসেট করুন। এই বোতামে ক্লিক করার আগে
    আপনার বর্তমান সেটিংস সংরক্ষণ করা হয়েছে কিনা তা অনুগ্রহ করে নিশ্চিত করুন।
  birman: အင်တာဖေ့စ်နှင့်လည်ပတ်ပြီးသောနိုင်ငံများစာရင်းကို ပြန်လည်စတင်ပါ။ ဤခလုတ်ကိုမနှိပ်မီ
    လက်ရှိဆက်တင်များကို သိမ်းဆည်းပြီးကြောင်း သေချာစစ်ဆေးပါ။
  breton: Adderaouekaat an etrefas hag ivez roll ar broioù bet gweladennet. Gwiriit
    hoc'h eus saveteet ar প্যারামetrezoù a-vremañ a-raok klikañ war ar bouton-mañ
  bulgare: Нулирай интерфейса и списъка с посетени държави. Моля, уверете се, че сте
    запазили текущите настройки, преди да натиснете този бутон
  catalan: Restableix la interfície i la llista de països visitats. Si us plau, verifiqueu
    que heu desat correctament els paràmetres actuals abans de fer clic en aquest
    botó
  corse: Ripristina l'interfaccia è a lista di i paesi visitati. Per piacè verificate
