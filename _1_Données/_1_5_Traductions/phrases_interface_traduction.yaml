  kurde: Destûrê dide hilbijartina ka meriv dixwaze hemû nexşeyan biweşîne an tenê
    yên ku xwediyê granularîteya xwestî ne. Bo nimûne, gelo em dixwazin nexşeyek ku
    tenê di asta herêmî de heye biweşînin, eger em nexşeyên di asta parêzgehê de bixwazin?
  latin: Sinitne eligere utrum omnes tabulae publicentur, an solum illae quae granulitatem
    optatam habeant. Utrum, exempli gratia, tabula quae tantum regionali gradu existit
    publicari debeat, si tabulae gradu departementali desiderentur?
  letton: Ļauj izvēlēties, vai publicēt visas kartes vai tikai tās, kurām ir vēlamā
    granularitāte. Vai, piemēram, vēlamies publicēt karti, kas pastāv tikai reģionālā
    līmenī, ja vēlamies kartes departamentu līmenī?
  lituanien: Leidžia pasirinkti, ar norima publikuoti visus žemėlapius, ar tik tuos,
    kurie turi norimą detalumo lygį. Ar, pavyzdžiui, norima publikuoti žemėlapį, kuris
    egzistuoja tik regioniniu lygiu, jei pageidaujami žemėlapiai apskrities lygiu?
  luxembourgeois: Erlaabt ze wielen ob een all Kaarten publizéiere wëll oder nëmmen
    déi mat der gewënschter Granularitéit. Wëll een zum Beispill eng Kaart publizéieren,
    déi nëmmen um regionale Niveau existéiert, wann een Kaarte um departementale Niveau
    wënscht?
  macédonien: Овозможува избор дали сакате да ги објавите сите карти или само оние
    што ја имаат саканата грануларност. Дали сакаме, на пример, да објавиме карта
    што постои само на регионално ниво ако сакаме карти на ниво на одделение?
  malais: Membolehkan pemilihan sama ada untuk menerbitkan keseluruhan peta atau hanya
    yang mempunyai granulariti yang dikehendaki. Contohnya, adakah kita mahu menerbitkan
    peta yang hanya wujud pada peringkat wilayah jika kita mahukan peta pada peringkat
    daerah?
  malgache: Ahafahana misafidy na hamoaka ny karatra rehetra sa ireo manana ny antsipiriany
    irina ihany. Ohatra, tiantsika ve ny hamoaka sarintany izay misy amin'ny sehatra
    isam-paritra fotsiny raha toa ka mila sarintany isam-paritra isika?
  maltais: Jippermetti li tagħżel jekk tixtieqx tippubblika l-mapep kollha jew dawk
    biss li għandhom il-granularità mixtieqa. Pereżempju, nixtiequ nippubblikaw mappa
    li teżisti biss fil-livell reġjonali jekk inkunu nixtiequ mapep fil-livell dipartimentali?
  mandarin standard: 可以选择发布全部地图，还是只发布具有所需粒度的地图。例如，如果想要发布省级地图，是否要发布仅存在于地区级别的地图？
  mongol: Бүх газрын зургийг эсвэл зөвхөн хүссэн нарийвчлалтай газрын зургийг нийтлэх
    эсэхийг сонгох боломжтой. Жишээлбэл, хэрэв бид аймгийн хэмжээний газрын зураг
    авахыг хүсвэл зөвхөн бүсийн хэмжээнд байдаг газрын зургийг нийтлэхийг хүсэж байна
    уу?
  norvégien: Gir mulighet til å velge om man ønsker å publisere alle kartene eller
    bare de som har ønsket granularitet. Ønsker man for eksempel å publisere et kart
    som bare finnes på regionalt nivå hvis man ønsker kart på fylkesnivå?
  néerlandais: Maakt het mogelijk te kiezen of alle kaarten gepubliceerd moeten worden,
    of alleen die met de gewenste granulariteit. Moeten we bijvoorbeeld een kaart
    publiceren die alleen op regionaal niveau bestaat als we kaarten op provinciaal
    niveau willen?
  népalais: सबै कार्डहरू प्रकाशित गर्ने कि केवल चाहिएको ग्रेन्युलैरिटी भएका कार्डहरू
    प्रकाशित गर्ने छनौट गर्न अनुमति दिन्छ। उदाहरणका लागि, यदि हामीलाई विभागीय स्तरका
    कार्डहरू चाहिएको छ भने क्षेत्रीय स्तरमा मात्र अवस्थित कार्ड प्रकाशित गर्न चाहन्छौं
    कि ?
  ourdou: یہ اختیار کرنے کی اجازت دیتا ہے کہ آیا تمام نقشے شائع کرنا چاہیں یا صرف
    وہ جن میں مطلوبہ باریکی ہو۔ مثال کے طور پر، کیا ہم ایک ایسا نقشہ شائع کرنا چاہتے
    ہیں جو صرف علاقائی سطح پر موجود ہے اگر ہم ضلعی سطح کے نقشے چاہتے ہیں؟
  ouzbek: Xohlagan aniqlikdagi kartalarnigina yoki barcha kartalarni chop etishni
    tanlash imkonini beradi. Misol uchun, agar bizga departament darajasidagi kartalar
    kerak bo'lsa, faqat regional darajada mavjud bo'lgan kartani chop etmoqchimizmi?
  pachto: دا چې آیا ټول نقشې خپرې شي که یوازې هغه چې مطلوب تفصیل لري غوره کیدی شي.
    د مثال په توګه، آیا غواړو هغه نقشه خپره کړو چې یوازې په سیمه ایزه کچه شتون لري
    که موږ په ولسوالۍ کچه نقشې غواړو؟
  persan: امکان انتخاب این وجود دارد که آیا کل نقشه‌ها منتشر شوند یا فقط نقشه‌هایی
