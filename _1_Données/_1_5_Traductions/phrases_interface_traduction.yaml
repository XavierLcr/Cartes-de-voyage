  coréen: 인터페이스와 방문 국가 목록을 초기화합니다. 이 버튼을 클릭하기 전에 현재 설정을 저장했는지 확인하십시오
  danois: Nulstil grænsefladen samt listen over besøgte lande. Kontroller venligst,
    at du har gemt de nuværende indstillinger, før du klikker på denne knap
  espagnol: Restablecer la interfaz y la lista de países visitados. Por favor, verifique
