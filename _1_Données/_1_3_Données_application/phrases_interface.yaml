# Onglet 5
sous_titre_description_application : Création de cartes de voyages
version : Version
description_application : "<h3>📌 Description :</h3>\n<p>Mes Voyages est une application permettant de créer des cartes de voyages personnalisées en sélectionnant les régions ou départements des pays que l'on a visités.</p>\n<h3>💻 Comment utiliser :</h3>\n<ol>\n<li>Saisissez votre nom et personnalisez vos paramètres.</li>\n<li>Sélectionnez les lieux que vous avez visités au niveau de granularité que vous préférez.</li>\n<li>Créez vos cartes ! La sauvegarde de vos visites et de vos paramètres se fait lorsque vous cliquez sur un des boutons de sauvegarde ou de création des cartes. Si vous changez d'onglet sans changer de profil, les lieux cochés ne sont pas perdus.</li>\n<li>Découvrez quels sont les pays que vous avez le plus visités et explorez nos recommandations pour vos prochaines vacances !</li>\n</ol>\n<h3>📋 Fichiers YAML disponibles :</h3>\n<p>Les fichiers <code>.yaml</code> fournis sont des <strong>modèles complets</strong> contenant tous les pays, régions et départements disponibles.</p>\n<p>▶️ Si vous préférez cette méthode afin d'indiquer les lieux que vous avez visités, copiez d'abord les modèles présents dans le dossier de l'application. Supprimez ensuite tous les lieux non visités et chargez-les dans l'application.</p>\n<h3>❓ Contact :</h3>\n<p>L'application se veut intuitive, mais pour toute question : xavier.cal181@gmail.com.</p>\n<p>Les traductions ont été générées automatiquement et n'ont pas été relues manuellement.\nPour toute anomalie de traduction, bug ou si vous souhaitez tout simplement effectuer un retour, n'hésitez pas à me contacter.</p>\n<hr />\n<strong>Merci d’avoir choisi Mes Voyages !</strong>"

