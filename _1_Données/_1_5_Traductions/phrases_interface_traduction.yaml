    αυτό το κουμπί
  grec ancien: Ἀνακομιδὴ τοῦ προσώπου καὶ τῆς τῶν ἐπισκεφθέντων χωρῶν λίστας. Ἐπιμελῶς
    σκεψάσθω τις, εἰ τὰ παρόντα ρύθμισματά τε σώσασθαι πρὸ τοῦ πατῆσαι τοῦτο τὸ πάτημα
  géorgien: გთხოვთ გადატვირთოთ ინტერფეისი და მონახულებული ქვეყნების სია. ღილაკზე დაჭერამდე
    დარწმუნდით, რომ შეინახეთ მიმდინარე პარამეტრები
  hindi: इंटरफ़ेस और यात्रा किए गए देशों की सूची रीसेट करें। इस बटन पर क्लिक करने
