Applique les paramètres esthétiques sélectionnés à l'application. Cela permet d'avoir un aperçu de leur rendu:
  afrikaans: Pas die geselekteerde estetiese parameters op die toepassing toe. Dit
    laat jou toe om 'n voorskou van hoe dit sal lyk, te sien
  albanais: Apliko parametrat estetikë të zgjedhur në aplikacion. Kjo lejon të shikohet
    pamja e tyre
  allemand: Wende die ausgewählten ästhetischen Parameter auf die Anwendung an. Dies
    ermöglicht eine Vorschau ihrer Darstellung
  anglais: Apply the selected aesthetic settings to the application. This allows you
    to preview how they look
  arabe: طبّق الإعدادات الجمالية المختارة على التطبيق. هذا يتيح معاينة شكلها النهائي
  arménien: 'Կիրառեք ընտրված գեղագիտական պարամետրերը հավելվածի վրա: Դա թույլ է տալիս
    նախադիտել դրանց պատկերումը:'
  basque: Aukeratutako parametro estetikoak aplikazioan aplikatu. Horrek horien itxura
    ikusten laguntzen du
  bengali: অ্যাপ্লিকেশনটিতে নির্বাচিত নান্দনিক পরামিতিগুলি প্রয়োগ করুন। এটি তাদের
    প্রদর্শনের একটি পূর্বরূপ পেতে সহায়তা করবে।
  birman: ရွေးချယ်ထားသော အလှအပဆိုင်ရာ ဆက်တင်များကို အက်ပ်တွင် အသုံးပြုပါ။ ၎င်းသည်
    မည်သို့မြင်ရမည်ကို ကြည့်ရှုနိုင်စေသည်။
  breton: Lakait an arventennoù estezek bet dibabet war ar meziant. Gant se e c'heller
    gwelet penaos e reont
  bulgare: Приложете избраните естетически параметри към приложението. Това позволява
    да се види как ще изглеждат
  catalan: Aplica els paràmetres estètics seleccionats a l'aplicació. Això permet
    tenir una previsualització del seu resultat
  corse: Applica i parametri estetichi scelti à l'applicazione. Què permette d'avè
    un'idea di u so rendimentu
  coréen: 선택한 미적 매개변수를 앱에 적용하세요. 이를 통해 렌더링 방식을 미리 볼 수 있습니다
  danois: Anvend de valgte æstetiske parametre på applikationen. Dette giver mulighed
    for at se, hvordan de ser ud
  espagnol: Aplica los parámetros estéticos seleccionados a la aplicación. Esto permite
    tener una vista previa de cómo se ven
  esperanto: Apliku la elektitajn estetikajn parametrojn al la aplikaĵo. Tio ebligas
    havi antaŭvidon pri ilia efekto
  estonien: Rakenda valitud esteetilised parameetrid rakendusele. See võimaldab näha,
    kuidas need välja näevad
  finnois: Ota valitut esteettiset asetukset käyttöön sovelluksessa. Näin näet, miltä
    ne näyttävät
  français: Applique les paramètres esthétiques sélectionnés à l'application. Cela
    permet d'avoir un aperçu de leur rendu
  gallois: Gweithredu'r gosodiadau esthetig dethol ar y rhaglen. Mae hyn yn galluogi
    rhagolwg o'u golwg
  grec: Εφάρμοσε τις επιλεγμένες αισθητικές παραμέτρους στην εφαρμογή. Αυτό επιτρέπει
    μια προεπισκόπηση της εμφάνισής τους
  grec ancien: Εφάρμοσε τα επιλεγμένα αισθητικά χαρακτηριστικά στην εφαρμογή. Αυτό
    επιτρέπει την επισκόπηση της απόδοσής τους
  géorgien: გამოიყენეთ არჩეული ესთეტიკური პარამეტრები აპლიკაციაზე. ეს საშუალებას მოგცემთ
    იხილოთ მათი ვიზუალიზაცია
  hindi: चुने हुए सौंदर्य संबंधी मापदंडों को एप्लिकेशन पर लागू करें। इससे उनके प्रदर्शन
    का पूर्वावलोकन करने में मदद मिलती है।
  hongrois: Alkalmazza a kiválasztott esztétikai beállításokat az alkalmazásra. Ez
    lehetővé teszi, hogy megtekintse, hogyan fognak kinézni
  indonésien: Terapkan parameter estetika yang dipilih ke aplikasi. Hal ini memungkinkan
    untuk melihat pratinjau tampilannya
  irlandais: Cuir na socruithe aeistéitiúla roghnaithe i bhfeidhm ar an bhfeidhmchlár.
    Ligeann sé seo duit réamhamharc a fháil ar an gcaoi a n-oireann siad
  islandais: Notaðu valin fagurfræðileg gildi á forritið. Þetta gefur forskoðun á
    útlitinu
  italien: Applica le impostazioni estetiche selezionate all'applicazione. Questo
    permette di avere un'anteprima del loro aspetto
  japonais: 選択された美的設定をアプリケーションに適用します。これにより、それらのレンダリングのプレビューが表示されます。
  kazakh: Таңдалған эстетикалық параметрлерді қолданбаға қолданыңыз. Бұл олардың қалай
    көрінетінін алдын ала көруге мүмкіндік береді
  kirghize: Тандалган кооздук параметрлерин тиркемеге колдонуңуз. Бул алардын көрүнүшүн
    алдын ала кароого мүмкүндүк берет
  kurde: Di sepanê de parametrên estetîk ên bijartî bicîh bike. Ev dihêle ku meriv
    xuyanga wan bibîne
  latin: Formae selectas applicationi adhibe. Hoc aspectum earum praemonstrare sinit
  letton: Lietot atlasītos estētiskos iestatījumus lietotnei. Tas ļauj priekšskatīt
    to izskatu
  lituanien: Pritaikykite pasirinktus estetinius nustatymus programai. Tai leidžia
    peržiūrėti, kaip jie atrodo
  luxembourgeois: Setz déi ausgewielte gestalteresch Astellungen an der Applikatioun
    un. Dat erlaabt Iech, e Virschau vun hirer Wiedergab ze gesinn
  macédonien: Примени ги избраните естетски параметри на апликацијата. Ова овозможува
    преглед на нивното прикажување
  malais: Terapkan parameter estetik yang dipilih pada aplikasi. Ini membolehkan pratonton
    bagaimana rupanya
  malgache: Ampiharo amin'ny rindranasa ireo lamina estetika voafantina. Izany dia
    ahafahana mahita mialoha ny endriny
  maltais: Applika l-parametri estetiċi magħżula għall-applikazzjoni. Dan jippermettilek
    tara kif se jidhru
  mandarin standard: 将选定的美学参数应用于应用程序，以便预览其效果。
  mongol: Сонгосон гоо зүйн тохиргоог аппликэйшнд хэрэглэ. Ингэснээр тэдний хэрхэн
    харагдахыг урьдчилан харах боломжтой
  norvégien: Bruk de valgte estetiske innstillingene på applikasjonen. Dette gir et
