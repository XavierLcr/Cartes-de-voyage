    svæðisbundnu stigi ef þú vilt kort á sýslustigi?
  italien: Permette di scegliere se si desidera pubblicare l'intera mappa o solo quelle
    con la granularità desiderata. Vogliamo, ad esempio, pubblicare una mappa che
    esiste solo a livello regionale se si desiderano mappe a livello dipartimentale?
  japonais: カード全体を公開するか、あるいは希望する粒度を持つカードのみを公開するかを選択できるようにします。例えば、都道府県レベルのカードが必要な場合に、地方レベルでのみ存在するカードを公開したいですか？
  kazakh: Карталардың барлығын жариялауды немесе қажетті дәрежедегілерін ғана жариялауды
