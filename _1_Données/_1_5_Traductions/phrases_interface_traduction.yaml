    només existeix a nivell regional si es volen cartes a nivell departamental?
  corse: Permette di sceglie s'è si vole publicà a totalità di e carte o solu quesse
    chì anu a granularità desiderata. Volemu per esempiu publicà una carta chì esiste
    solu à livellu regiunale se si volenu carte à livellu dipartimentale?
  coréen: 전체 카드를 게시할지 아니면 원하는 세분성 수준을 가진 카드만 게시할지 선택할 수 있습니다. 예를 들어, 지역 수준에서만 존재하는
    카드를 부서 수준에서만 카드를 게시하려고 할 때 게시하시겠습니까?
  danois: Gør det muligt at vælge, om man vil offentliggøre alle kortene eller kun
    dem, der har den ønskede granularitet. Vil man for eksempel offentliggøre et kort,
    der kun eksisterer på regionalt niveau, hvis man ønsker kort på departementsniveau?
  espagnol: Permite elegir si se desea publicar la totalidad de los mapas o solo aquellos
    que poseen la granularidad deseada. ¿Se desea, por ejemplo, publicar un mapa que
    solo existe a nivel regional si se desean mapas a nivel departamental?
  esperanto: Ebligas elekti ĉu oni deziras publikigi la tutaĵon de la mapoj aŭ nur
    tiujn, kiuj havas la deziritan grenularon. Ĉu oni ekzemple volas publikigi mapon,
    kiu ekzistas nur je regiona nivelo, se oni deziras mapojn je departementa nivelo?
  estonien: Võimaldab valida, kas avaldada kõik kaardid või ainult need, millel on
    soovitud detailitase. Kas avaldada näiteks ainult piirkondlikul tasandil olemasolev
    kaart, kui soovitakse maakondlikke kaarte?
  finnois: Mahdollistaa valinnan, halutaanko julkaista kaikki kartat vai vain ne,
    joilla on haluttu tarkkuus. Halutaanko esimerkiksi julkaista kartta, joka on olemassa
