  bengali: আমরা সম্পূর্ণ মানচিত্র প্রকাশ করতে চাই নাকি শুধুমাত্র পছন্দসই বিস্তারিততা
    সম্পন্ন মানচিত্র প্রকাশ করতে চাই, তা নির্বাচন করার অনুমতি দেয়। উদাহরণস্বরূপ,
    আমরা কি বিভাগীয় স্তরের মানচিত্র চাইলেও শুধুমাত্র আঞ্চলিক স্তরে বিদ্যমান একটি
    মানচিত্র প্রকাশ করতে চাই?
  birman: ကတ်အားလုံးကို ထုတ်ဝေချင်သလား ဒါမှမဟုတ် လိုချင်တဲ့ granularité ရှိတဲ့ ကတ်တွေကိုပဲ
    ထုတ်ဝေချင်သလားဆိုတာ ရွေးချယ်ခွင့်ပေးပါတယ်။ ဥပမာအားဖြင့်၊ ခရိုင်အဆင့်မှာ မြေပုံတွေလိုချင်ရင်
    ဒေသအဆင့်မှာပဲ ရှိတဲ့ မြေပုံကို ထုတ်ဝေမှာလား။
  breton: Aotre da zibab hag-eñ e fell deomp embann an holl gartennoù pe nemet ar
