  tamoul: விருப்பமான துகள்களைக் கொண்ட வரைபடங்களை மட்டும் வெளியிட வேண்டுமா அல்லது அனைத்து
    வரைபடங்களையும் வெளியிட வேண்டுமா என்பதைத் தேர்வு செய்ய அனுமதிக்கிறது. உதாரணமாக,
    மாவட்ட அளவிலான வரைபடங்கள் தேவைப்படும்போது, பிராந்திய அளவில் மட்டுமே இருக்கும்
