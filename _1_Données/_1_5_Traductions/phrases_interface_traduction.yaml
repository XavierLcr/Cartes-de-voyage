    облыстық деңгейдегі картаны жариялау керек пе?
  kirghize: Карталардын баарын же керектүү деталдуулугу бар карталарды гана жарыялоону
    тандоого мүмкүндүк берет. Мисалы, эгер биз райондук деңгээлдеги карталарды кааласак,
