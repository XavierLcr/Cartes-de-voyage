    ենք հրապարակել մի քարտեզ, որը գոյություն ունի միայն տարածաշրջանային մակարդակով,
    եթե ցանկանում ենք մարզային մակարդակով քարտեզներ։
  basque: Kartez osotasuna argitaratu nahi den ala granularitate egokia dutenak soilik
