    teżisti biss fil-livell reġjonali jekk irridu mapep fil-livell dipartimentali?
  mandarin standard: 可以选择发布所有地图，也可以只发布具有所需粒度的地图。例如，如果只想获取县级地图，是否要发布仅存在于省级级别的地图？
  mongol: Бүх газрын зургийг нийтлэх, эсвэл зөвхөн хүссэн нарийвчлалтайг нь нийтлэхийг
    сонгох боломжтой. Жишээлбэл, хэрэв бид аймагт газрын зураг авахыг хүсвэл зөвхөн
    бүс нутгийн түвшинд байдаг газрын зургийг нийтлэх үү?
  norvégien: Gjør det mulig å velge om man vil publisere alle kartene eller bare de
    med ønsket granularitet. Ønsker man for eksempel å publisere et kart som bare
    finnes på regionalt nivå hvis man ønsker kart på fylkesnivå?
  néerlandais: Maakt het mogelijk om te kiezen of men alle kaarten wil publiceren
    of alleen de kaarten met de gewenste granulariteit. Willen we bijvoorbeeld een
    kaart publiceren die alleen op regionaal niveau bestaat als we kaarten op departementaal
    niveau willen?
  népalais: सबै नक्सा वा चाहेको तह मात्रै प्रकाशित गर्ने छनौट गर्न अनुमति दिन्छ। उदाहरणका
    लागि, के हामी क्षेत्रीय स्तरमा मात्रै अवस्थित नक्सालाई जिल्ला स्तरका नक्सा चाहिने
    बेला प्रकाशित गर्न चाहन्छौं?
  ourdou: یہ آپ کو منتخب کرنے کی اجازت دیتا ہے کہ آیا آپ تمام نقشے شائع کرنا چاہتے
    ہیں یا صرف وہ نقشے جن میں مطلوبہ گرینیوریٹی ہے۔ کیا، مثال کے طور پر، ہم ایک نقشہ
    شائع کرنا چاہتے ہیں جو صرف علاقائی سطح پر موجود ہے اگر ہم ضلعی سطح پر نقشے چاہتے
    ہیں؟
  ouzbek: Barcha kartalarni nashr etish yoki faqat kerakli maydalash darajasiga ega
    bo'lganlarini tanlash imkonini beradi. Misol uchun, agar biz tuman darajasidagi
    kartalarni istasak, faqat mintaqaviy darajada mavjud bo'lgan kartani nashr etishni
    xohlaymizmi?
  pachto: د دې اجازه ورکوي چې وټاکل شي که ټولې نقشې خپرول غواړي یا یوازې هغه نقشې
    چې مطلوبې اندازې لري. ایا موږ غواړو د مثال په توګه یوه نقشه خپره کړو چې یوازې
    په سیمه ایزه کچه شتون لري که موږ د ولسوالۍ په کچه نقشې غواړو؟
  persan: به شما اجازه می‌دهد انتخاب کنید که آیا می‌خواهید تمام نقشه‌ها را منتشر کنید
    یا فقط نقشه‌هایی را که دارای دانه‌بندی مورد نظر هستند. به عنوان مثال، آیا می‌خواهیم
    نقشه‌ای را که فقط در سطح منطقه‌ای وجود دارد، در صورتی که نقشه‌های سطح دپارتمانال
    مورد نیاز است، منتشر کنیم؟
  polonais: Pozwala wybrać, czy chcemy opublikować całe mapy, czy tylko te, które
    mają pożądaną szczegółowość. Czy na przykład chcemy opublikować mapę, która istnieje
    tylko na poziomie regionalnym, jeśli chcemy mapy na poziomie departamentu?
  portugais: Permite escolher se se deseja publicar a totalidade dos mapas ou apenas
    aqueles com a granularidade desejada. Pretende-se, por exemplo, publicar um mapa
    que só existe a nível regional se se desejam mapas a nível departamental?
  roumain: Permite de a alege dacă se dorește publicarea tuturor hărților sau doar
    a celor cu granularitatea dorită. De exemplu, dorim să publicăm o hartă care există
    doar la nivel regional dacă dorim hărți la nivel județean?
  russe: Позволяет выбрать, следует ли публиковать все карты или только те, которые
    имеют желаемую детализацию. Например, следует ли публиковать карту, существующую
    только на региональном уровне, если нужны карты на департаментском уровне?
  serbo-croate: Omogućava izbor da li želite da objavite sve karte ili samo one sa
    željenom granularnošću. Na primer, da li želite da objavite kartu koja postoji
    samo na regionalnom nivou ako želite karte na nivou okruga?
  slovaque: Umožňuje zvoliť, či sa majú publikovať všetky mapy, alebo iba tie s požadovanou
    granularitou. Chceme napríklad publikovať mapu, ktorá existuje iba na regionálnej
    úrovni, ak chceme mapy na úrovni okresov?
  slovène: Omogoča izbiro, ali želite objaviti celotne karte ali samo tiste z želeno
    stopnjo podrobnosti. Želimo na primer objaviti karto, ki obstaja samo na regionalni
    ravni, če želimo karte na ravni departmaja?
  suédois: Gör det möjligt att välja om man vill publicera hela kartorna eller bara
    de med önskad granularitet. Vill man till exempel publicera en karta som bara
    finns på regional nivå om man vill ha kartor på länsnivå?
  swahili: Inaruhusu kuchagua kama unataka kuchapisha ramani zote au zile tu zenye
    usahihi unaohitajika. Je, kwa mfano, tunataka kuchapisha ramani ambayo ipo tu
    katika ngazi ya mkoa ikiwa tunataka ramani katika ngazi ya idara?
  tadjik: Имконият медиҳад, ки оё тамоми харитаҳо ё танҳо харитаҳоеро, ки дараҷаи
    дилхоҳ доранд, нашр кардан мехоҳанд, интихоб кунем. Масалан, оё мо мехоҳем харитаеро
    нашр кунем, ки танҳо дар сатҳи минтақавӣ вуҷуд дорад, агар мо харитаҳоро дар сатҳи
    вилоятӣ мехоҳем?
  tamoul: முழு அட்டைகளையும் வெளியிட வேண்டுமா அல்லது விரும்பிய நுணுக்கங்களைக் கொண்ட
    அட்டைகளை மட்டுமே வெளியிட வேண்டுமா என்பதைத் தேர்ந்தெடுக்க இது அனுமதிக்கிறது. உதாரணமாக,
    மாவட்ட அளவில் வரைபடங்கள் தேவைப்பட்டால், பிராந்திய அளவில் மட்டுமே இருக்கும் ஒரு
    வரைபடத்தை வெளியிட விரும்புகிறோமா?
  tchèque: Umožňuje vybrat, zda se mají publikovat všechny mapy, nebo pouze ty s požadovanou
    granularitou. Chceme například publikovat mapu, která existuje pouze na regionální
    úrovni, pokud chceme mapy na úrovni okresů?
  thaï: ช่วยให้สามารถเลือกได้ว่าจะเผยแพร่แผนที่ทั้งหมดหรือเฉพาะแผนที่ที่มีรายละเอียดตามที่ต้องการ
    ตัวอย่างเช่น เราต้องการเผยแพร่แผนที่ที่มีเฉพาะระดับภูมิภาคหรือไม่ ถ้าเราต้องการแผนที่ในระดับจังหวัด?
  tibétain: ས་ཁྲ་ཡོངས་རྫོགས་སྤེལ་འདོད་ཡོད་མེད་དང་། ཡང་ན་ཞིབ་ཚགས་ཀྱི་ཆ་རྐྱེན་དང་འཚམ་པའི་ས་ཁྲ་ཁོ་ན་སྤེལ་འདོད་ཡོད་མེད་གདམ་ཀ་བྱེད་ཆོག
    དཔེར་ན། རྫོང་རིམ་པའི་ས་ཁྲ་དགོས་སྐབས་ས་ཁུལ་རིམ་པའི་ས་ཁྲ་སྤེལ་འདོད་ཡོད་དམ།
  turc: Haritaların tamamının mı yoksa sadece istenen ayrıntı düzeyine sahip olanların
    mı yayınlanmak istendiğini seçme imkanı sağlar. Örneğin, departman düzeyinde haritalar
    isteniyorsa, yalnızca bölgesel düzeyde mevcut olan bir harita yayınlanmak istenebilir
    mi?
  turkmène: Kartalaryň ählisini ýa-da diňe islenýän granullarlygy bolanlaryny neşir
