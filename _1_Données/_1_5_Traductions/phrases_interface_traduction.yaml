    samo na regionalnom nivou ako želite karte na nivou okruga?
  slovaque: Umožňuje vybrať, či sa majú publikovať všetky mapy alebo len tie, ktoré
    majú požadovanú granularitu. Chceme napríklad publikovať mapu, ktorá existuje
