  tamoul: தேர்ந்தெடுக்கப்பட்ட அழகியல் அளவுருக்களை பயன்பாட்டிற்குப் பயன்படுத்துங்கள்.
    இது அவற்றின் வெளியீட்டை முன்னோட்டமிட அனுமதிக்கிறது
  tchèque: Použijte vybrané estetické parametry na aplikaci. To umožní zobrazit náhled
    toho, jak budou vypadat
  thaï: ใช้การตั้งค่าความสวยงามที่เลือกกับแอปพลิเคชัน เพื่อดูตัวอย่างลักษณะที่ปรากฏ
