  néerlandais: Pas de probleemgebonden esthetische parameters toe op de applicatie.
    Zo krijg je een idee van hoe ze eruit zullen zien
  népalais: चयन गरिएका सौन्दर्य मापदण्डहरू अनुप्रयोगमा लागू गर्नुहोस्। यसले तिनीहरूको
    रेन्डरिङको पूर्वावलोकन गर्न मद्दत गर्छ।
  ourdou: منتخب کردہ جمالیاتی ترتیبات کو اطلاق پر لاگو کریں۔ اس سے ان کے اثر کا جائزہ
    لینے میں مدد ملے گی۔
  ouzbek: Tanlangan estetik sozlamalarni ilovaga qo'llang. Bu ularning qanday ko'rinishini
    ko'rish imkonini beradi
  pachto: ټاکل شوي ښکلاپارامترونه په اپلیکیشن تطبیق کړئ. دا د دوی د رینډینګ لیدلو
